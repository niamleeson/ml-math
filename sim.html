<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ML Engineering Lab — ML Math Tutor</title>

<script>
  (function () {
    try {
      var t = localStorage.getItem("mlmath_theme");
      if (t !== "light" && t !== "dark") t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
  })();
</script>

<style>
  :root {
    --bg:#0f1419; --panel:#161c24; --panel-2:#1d2530; --ink:#e6edf3; --ink-dim:#9aa7b4;
    --accent:#4ea1ff; --accent-2:#7ee787; --warn:#ffb454; --border:#2a3340; --good:#2ea043;
    --purple:#c89bff; --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  :root[data-theme="light"] {
    --bg:#f6f8fa; --panel:#fff; --panel-2:#eaeef2; --ink:#1f2328; --ink-dim:#59636e;
    --accent:#0969da; --accent-2:#1a7f37; --warn:#9a6700; --border:#d0d7de; --good:#1a7f37;
    --purple:#8250df; --shadow:0 6px 20px rgba(140,149,159,.18);
  }
  html { color-scheme: dark; } html[data-theme="light"] { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }

  header {
    position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:12px 22px; background:var(--panel); border-bottom:1px solid var(--border);
  }
  header h1 { font-size:17px; margin:0; }
  header .spacer { flex:1; }
  header a, header button { background:var(--bg); border:1px solid var(--border); color:var(--ink);
    border-radius:8px; padding:7px 11px; font-size:13px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
  header a:hover, header button:hover { border-color:var(--accent); }
  header a.back { font-weight:700; }

  .wrap { max-width:1080px; margin:0 auto; padding:24px 22px 100px; }
  .intro { color:var(--ink-dim); margin:0 0 22px; max-width:760px; }

  /* App picker */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
  .appcard { text-align:left; background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; cursor:pointer; transition:border-color .12s, transform .12s; box-shadow:var(--shadow); }
  .appcard:hover { border-color:var(--accent); transform:translateY(-1px); }
  .appcard .ic { font-size:24px; }
  .appcard .nm { font-weight:700; font-size:15px; margin:6px 0 3px; }
  .appcard .gl { color:var(--ink-dim); font-size:12.5px; line-height:1.4; }

  /* Lab view */
  .labhead { display:flex; align-items:flex-start; gap:12px; margin:0 0 16px; }
  .labhead .ic { font-size:30px; }
  .labhead h2 { font-size:23px; margin:0; }
  .labhead .gl { color:var(--ink-dim); margin:3px 0 0; font-size:14px; }
  .labhead .close { margin-left:auto; flex:none; align-self:flex-start; background:var(--panel); border:1px solid var(--border);
    color:var(--ink); border-radius:10px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:border-color .15s, background .15s; }
  .labhead .close:hover { border-color:var(--accent); background:var(--panel-2); }

  .phasebar { display:flex; flex-wrap:wrap; gap:5px; margin:0 0 18px; }
  .phasebar .ph {
    font-size:11.5px; padding:4px 9px; border-radius:14px; border:1px solid var(--border);
    background:var(--panel); color:var(--ink-dim); cursor:pointer; white-space:nowrap;
  }
  .phasebar .ph.active { border-color:var(--accent); color:var(--ink); background:var(--panel-2); font-weight:600; }
  .phasebar .ph.done { color:var(--accent-2); border-color:var(--good); }
  .phasebar .ph .pn { opacity:.6; margin-right:4px; }

  .lab { display:grid; grid-template-columns:1fr 250px; gap:18px; align-items:start; }
  @media (max-width:780px){ .lab { grid-template-columns:1fr; } }

  .stage { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px 20px; box-shadow:var(--shadow); }
  .stage .ptag { font-size:11px; letter-spacing:.07em; text-transform:uppercase; color:var(--accent); font-weight:700; }
  .stage h3 { margin:4px 0 10px; font-size:19px; }
  .stage .narr { color:var(--ink); font-size:14.5px; }
  .stage .narr p:first-child { margin-top:0; }

  /* steps */
  .step { margin:14px 0 0; padding-top:14px; border-top:1px solid var(--border); }
  .step .q { font-weight:600; margin:0 0 8px; }
  .opts { display:flex; flex-direction:column; gap:7px; }
  .opt { text-align:left; background:var(--bg); border:1px solid var(--border); color:var(--ink); border-radius:9px;
    padding:9px 12px; cursor:pointer; font-size:14px; }
  .opt:hover { border-color:var(--accent); }
  .opt.chosen { border-color:var(--accent); background:var(--panel-2); }
  .opt.best.revealed { border-color:var(--good); }
  .opt .fb { display:none; margin-top:6px; font-size:13px; color:var(--ink-dim); }
  .opt.chosen .fb { display:block; }
  .opt .verdict { font-weight:700; margin-right:6px; }
  .opt.best.chosen .verdict { color:var(--accent-2); }
  .opt:not(.best).chosen .verdict { color:var(--warn); }

  .runbtn { background:var(--good); color:#fff; border:none; border-radius:9px; padding:9px 16px; font-size:14px; font-weight:600; cursor:pointer; }
  .runbtn:hover { filter:brightness(1.08); }
  .runbtn:disabled { opacity:.6; cursor:default; }
  .result { margin-top:10px; display:none; }
  .result.show { display:block; }
  .termlog { background:#11161d; border:1px solid #222b36; border-radius:8px; padding:10px 12px; color:#d6deeb;
    font-family:"SF Mono",ui-monospace,Menlo,monospace; font-size:12.5px; white-space:pre-wrap; }
  :root[data-theme="light"] .termlog { background:#0d1117; }
  .metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:9px; }
  .metric { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:6px 11px; font-size:13px; }
  .metric b { color:var(--accent-2); font-variant-numeric:tabular-nums; }
  .resnote { margin-top:8px; font-size:13.5px; color:var(--ink-dim); }

  .navrow { display:flex; gap:10px; margin-top:18px; }
  .navrow button { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--ink); border-radius:10px;
    padding:11px; cursor:pointer; font-size:14px; }
  .navrow button:hover { border-color:var(--accent); }
  .navrow button.primary { background:var(--accent); color:#04121f; border-color:var(--accent); font-weight:700; }
  .navrow button:disabled { opacity:.4; cursor:default; }

  /* concepts panel */
  .concepts { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px 16px; position:sticky; top:80px; }
  .concepts h4 { margin:0 0 4px; font-size:13px; }
  .concepts .hint { color:var(--ink-dim); font-size:12px; margin:0 0 10px; }
  .concepts a { display:block; text-decoration:none; color:var(--ink); background:var(--bg); border:1px solid var(--border);
    border-radius:8px; padding:7px 10px; font-size:13px; margin-bottom:6px; }
  .concepts a:hover { border-color:var(--accent); color:var(--accent); }
  .concepts a .arw { color:var(--accent); float:right; }

  /* rich stage content: insight callout, data peek, symbol table */
  .insight { margin:12px 0 0; padding:10px 13px; border-left:3px solid var(--warn);
    background:rgba(255,180,84,.10); border-radius:0 8px 8px 0; font-size:14px; }
  .insight b { color:var(--ink); }
  .datapeek { margin:14px 0 0; }
  .datapeek .dpcap { font-size:12px; font-weight:700; color:var(--accent); letter-spacing:.04em; text-transform:uppercase; margin-bottom:6px; }
  .datapeek .scroll { overflow-x:auto; border:1px solid var(--border); border-radius:9px; }
  .datapeek table { border-collapse:collapse; width:100%; font-size:12.5px; font-family:"SF Mono",ui-monospace,Menlo,monospace; }
  .datapeek th { text-align:left; background:var(--panel-2); color:var(--ink-dim); padding:6px 10px; border-bottom:1px solid var(--border); white-space:nowrap; font-weight:600; }
  .datapeek td { padding:6px 10px; border-bottom:1px solid var(--border); white-space:nowrap; color:var(--ink); }
  .datapeek tr:last-child td { border-bottom:none; }
  .datapeek .dpnote { font-size:12.5px; color:var(--ink-dim); margin-top:6px; }
  .symbox { margin:14px 0 0; }
  .symbox .symcap { font-size:12px; font-weight:700; color:var(--purple); letter-spacing:.04em; text-transform:uppercase; margin-bottom:4px; }
  .symt { width:100%; border-collapse:collapse; font-size:13.5px; }
  .symt td { padding:6px 10px; border-top:1px solid var(--border); vertical-align:top; }
  .symt tr:first-child td { border-top:none; }
  .symt td.sym { width:120px; white-space:nowrap; color:var(--ink); }
  .chartwrap { margin:14px 0 0; border:1px solid var(--border); border-radius:10px; padding:10px 12px; background:var(--bg); }
  .chartwrap .charttitle { font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:6px; }
  canvas.simchart { width:100%; max-width:600px; height:auto; display:block; }
  .err { padding:30px; }
</style>
</head>

<script>
const Sim = (function () {
  const L = {};
  let cur = null, stageIdx = 0, chartReg = [];

  // ---- Canvas charts: the visuals an ML engineer actually looks at ----
  function cvar(n, d) { return (getComputedStyle(document.documentElement).getPropertyValue(n) || d).trim(); }
  function chartCanvas(spec) {
    if (!spec || !spec.type) return "";
    const i = chartReg.length; chartReg.push(spec);
    return `<div class="chartwrap">${spec.title ? `<div class="charttitle">📈 ${spec.title}</div>` : ""}` +
      `<canvas class="simchart" data-ci="${i}" width="600" height="${spec.h || 250}"></canvas></div>`;
  }
  function drawAllCharts() {
    const draw = { bars: drawBars, hist: drawBars, line: drawLine, scatter: drawScatter, roc: drawRoc, confusion: drawConfusion };
    document.querySelectorAll(".simchart").forEach(cv => {
      const spec = chartReg[+cv.dataset.ci]; if (!spec || !draw[spec.type]) return;
      const ctx = cv.getContext("2d"); ctx.clearRect(0, 0, cv.width, cv.height);
      try { draw[spec.type](ctx, cv, spec); } catch (e) {}
    });
  }
  function legend(ctx, cv, items) {
    ctx.font = "11px sans-serif"; ctx.textAlign = "left"; let y = 16;
    items.forEach(it => { ctx.fillStyle = it.color; ctx.fillRect(cv.width - 130, y - 8, 10, 10);
      ctx.fillStyle = cvar("--ink-dim", "#9aa7b4"); ctx.fillText(it.name, cv.width - 115, y + 1); y += 15; });
  }
  function drawBars(ctx, cv, s) {
    const W = cv.width, H = cv.height, pad = 36, bw = W - pad - 14, bh = H - pad - 26;
    const vals = s.values || [], labs = s.labels || [], n = vals.length || 1;
    const max = Math.max(...vals.map(v => +v || 0), 1e-9);
    const ink = cvar("--ink", "#e6edf3"), dim = cvar("--ink-dim", "#9aa7b4"), bd = cvar("--border", "#2a3340"), ac = cvar("--accent", "#4ea1ff");
    ctx.strokeStyle = bd; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(pad, 12); ctx.lineTo(pad, 12 + bh); ctx.lineTo(pad + bw, 12 + bh); ctx.stroke();
    const slot = bw / n, w = slot * 0.66;
    ctx.font = "10px sans-serif";
    vals.forEach((v, i) => {
      const x = pad + i * slot + (slot - w) / 2, hh = Math.max(1, (+v / max) * bh), y = 12 + bh - hh;
      ctx.fillStyle = (s.colors && s.colors[i]) || ac; ctx.fillRect(x, y, w, hh);
      ctx.fillStyle = dim; ctx.textAlign = "center"; ctx.fillText(labs[i] != null ? labs[i] : "", x + w / 2, 12 + bh + 13);
      ctx.fillStyle = ink; ctx.fillText((s.valueLabels && s.valueLabels[i] != null) ? s.valueLabels[i] : v, x + w / 2, y - 3);
    });
  }
  function axes(ctx, cv, padL, padT, padB) {
    const bd = cvar("--border", "#2a3340");
    ctx.strokeStyle = bd; ctx.lineWidth = 1; ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, cv.height - padB); ctx.lineTo(cv.width - 14, cv.height - padB); ctx.stroke();
  }
  function drawLine(ctx, cv, s) {
    const padL = 46, padT = 14, padB = 30, series = s.series || [];
    let xs = [], ys = []; series.forEach(se => (se.points || []).forEach(p => { xs.push(p[0]); ys.push(p[1]); }));
    if (!xs.length) return;
    const xmin = Math.min(...xs), xmax = Math.max(...xs), ymin = Math.min(...ys), ymax = Math.max(...ys);
    const px = x => padL + (xmax > xmin ? (x - xmin) / (xmax - xmin) : 0) * (cv.width - padL - 14);
    const py = y => (cv.height - padB) - (ymax > ymin ? (y - ymin) / (ymax - ymin) : .5) * (cv.height - padT - padB);
    const dim = cvar("--ink-dim", "#9aa7b4");
    axes(ctx, cv, padL, padT, padB);
    ctx.fillStyle = dim; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
    ctx.fillText((+ymax).toFixed(2), padL - 5, py(ymax) + 3); ctx.fillText((+ymin).toFixed(2), padL - 5, py(ymin) + 3);
    ctx.textAlign = "center";
    if (s.xlabel) ctx.fillText(s.xlabel, (padL + cv.width - 14) / 2, cv.height - 8);
    if (s.ylabel) { ctx.save(); ctx.translate(12, (padT + cv.height - padB) / 2); ctx.rotate(-Math.PI / 2); ctx.fillText(s.ylabel, 0, 0); ctx.restore(); }
    series.forEach(se => {
      ctx.strokeStyle = se.color || cvar("--accent", "#4ea1ff"); ctx.lineWidth = 2; ctx.beginPath();
      (se.points || []).forEach((p, i) => { const X = px(p[0]), Y = py(p[1]); i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }); ctx.stroke();
    });
    legend(ctx, cv, series.filter(se => se.name).map(se => ({ name: se.name, color: se.color || cvar("--accent", "#4ea1ff") })));
  }
  function drawScatter(ctx, cv, s) {
    const padL = 44, padT = 14, padB = 30, groups = s.groups || [];
    let xs = [], ys = []; groups.forEach(g => (g.points || []).forEach(p => { xs.push(p[0]); ys.push(p[1]); }));
    if (!xs.length) return;
    const xmin = Math.min(...xs), xmax = Math.max(...xs), ymin = Math.min(...ys), ymax = Math.max(...ys);
    const px = x => padL + (xmax > xmin ? (x - xmin) / (xmax - xmin) : .5) * (cv.width - padL - 14);
    const py = y => (cv.height - padB) - (ymax > ymin ? (y - ymin) / (ymax - ymin) : .5) * (cv.height - padT - padB);
    axes(ctx, cv, padL, padT, padB);
    const dim = cvar("--ink-dim", "#9aa7b4"); ctx.fillStyle = dim; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    if (s.xlabel) ctx.fillText(s.xlabel, (padL + cv.width - 14) / 2, cv.height - 8);
    groups.forEach(g => { ctx.fillStyle = g.color || cvar("--accent", "#4ea1ff");
      (g.points || []).forEach(p => { ctx.beginPath(); ctx.arc(px(p[0]), py(p[1]), 3.2, 0, 7); ctx.fill(); }); });
    legend(ctx, cv, groups.filter(g => g.name).map(g => ({ name: g.name, color: g.color || cvar("--accent", "#4ea1ff") })));
  }
  function drawRoc(ctx, cv, s) {
    const padL = 44, padT = 14, padB = 30, sz = Math.min(cv.width - padL - 20, cv.height - padT - padB);
    const x0 = padL, y0 = cv.height - padB;
    const px = f => x0 + f * sz, py = t => y0 - t * sz;
    axes(ctx, cv, padL, padT, padB);
    ctx.strokeStyle = cvar("--ink-dim", "#9aa7b4"); ctx.setLineDash([4, 4]); ctx.beginPath(); ctx.moveTo(px(0), py(0)); ctx.lineTo(px(1), py(1)); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle = cvar("--accent-2", "#7ee787"); ctx.lineWidth = 2; ctx.beginPath();
    (s.points || [[0, 0], [1, 1]]).forEach((p, i) => { const X = px(p[0]), Y = py(p[1]); i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }); ctx.stroke();
    ctx.fillStyle = cvar("--ink", "#e6edf3"); ctx.font = "12px sans-serif"; ctx.textAlign = "left";
    if (s.auc != null) ctx.fillText("AUC = " + s.auc, px(0.45), py(0.2));
    ctx.fillStyle = cvar("--ink-dim", "#9aa7b4"); ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("false positive rate", (px(0) + px(1)) / 2, cv.height - 8);
  }
  function drawConfusion(ctx, cv, s) {
    const labs = s.labels || [], M = s.matrix || [], n = M.length || 1;
    const top = 22, left = 70, cell = Math.min(58, (cv.height - top - 24) / n, (cv.width - left - 14) / n);
    let max = 1; M.forEach(r => r.forEach(v => { if (+v > max) max = +v; }));
    const ink = cvar("--ink", "#e6edf3"), dim = cvar("--ink-dim", "#9aa7b4");
    ctx.font = "11px sans-serif";
    for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) {
      const v = +(M[i][j] || 0), x = left + j * cell, y = top + i * cell, a = 0.12 + 0.85 * (v / max);
      ctx.fillStyle = (i === j ? "rgba(46,160,67," : "rgba(78,161,255,") + a.toFixed(2) + ")";
      ctx.fillRect(x, y, cell - 2, cell - 2);
      ctx.fillStyle = ink; ctx.textAlign = "center"; ctx.fillText(s.fmt ? s.fmt(v) : v, x + cell / 2 - 1, y + cell / 2 + 3);
    }
    ctx.fillStyle = dim; ctx.textAlign = "right";
    labs.forEach((l, i) => ctx.fillText(l, left - 6, top + i * cell + cell / 2 + 3));
    ctx.textAlign = "center";
    labs.forEach((l, j) => ctx.fillText(l, left + j * cell + cell / 2, top - 7));
    ctx.fillStyle = dim; ctx.textAlign = "left"; ctx.fillText("rows = actual, cols = predicted", left, top + n * cell + 15);
  }

  function theme(){ return document.documentElement.getAttribute("data-theme")==="light"?"light":"dark"; }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderPicker() {
    const sims = window.SIMULATIONS || {};
    const apps = (window.APPLICATIONS || []).filter(a => sims[a.id]);
    document.getElementById("view").innerHTML =
      `<div class="intro">Go through the motions of building a real ML system — end to end, with no waiting.
       Pick a project below. You'll frame the problem, gather and clean data, engineer features, pick and train a model,
       evaluate, iterate, deploy, and monitor it — making the calls an ML engineer makes. A side panel shows exactly
       which lesson concepts each step uses.</div>` +
      `<div class="grid">` + apps.map(a => {
        const s = sims[a.id];
        return `<button class="appcard" onclick="Sim.open('${a.id}')">
          <div class="ic">${s.icon || a.icon || "🛠️"}</div>
          <div class="nm">${esc(s.title || a.name)}</div>
          <div class="gl">${esc(s.goal || a.blurb || "")}</div>
        </button>`;
      }).join("") + `</div>`;
    if (!apps.length) document.getElementById("view").innerHTML = `<div class="err">No simulations loaded yet.</div>`;
  }

  function open(id) { cur = (window.SIMULATIONS || {})[id]; cur._id = id; stageIdx = 0; renderLab(); window.scrollTo(0,0); pushURL(); }
  function close() { cur = null; renderPicker(); window.scrollTo(0,0); pushURL(); }

  function conceptPanel(stage) {
    const ids = (stage.concepts || []);
    const links = ids.map(cid => {
      const l = L[cid]; if (!l) return "";
      return `<a href="index.html#${cid}">${esc(l.title)}<span class="arw">↗</span></a>`;
    }).join("");
    return `<div class="concepts"><h4>🧩 Concepts in play</h4>
      <p class="hint">The math behind what you're doing right now:</p>${links || '<p class="hint">—</p>'}</div>`;
  }

  function renderStepHtml(step, si) {
    if (step.type === "decide") {
      const opts = (step.options || []).map((o, oi) =>
        `<button class="opt ${o.best ? "best" : ""}" onclick="Sim.choose(${si},${oi})">
          <span class="otext">${esc(o.label)}</span>
          <div class="fb"><span class="verdict">${o.best ? "✓ Good call." : "△ Workable, but"}</span>${o.feedback || ""}</div>
        </button>`).join("");
      return `<div class="step" id="step-${si}"><p class="q">${step.prompt || ""}</p><div class="opts">${opts}</div></div>`;
    }
    if (step.type === "run") {
      const r = step.result || {};
      const metrics = (r.metrics || []).map(m => `<span class="metric">${esc(m.k)}: <b>${esc(m.v)}</b></span>`).join("");
      return `<div class="step" id="step-${si}">${step.prompt ? `<p class="q">${step.prompt}</p>` : ""}
        <button class="runbtn" onclick="Sim.run(${si})">${esc(step.label || "▶ Run")}</button>
        <div class="result" id="res-${si}">
          ${r.log ? `<div class="termlog">${esc(r.log)}</div>` : ""}
          ${metrics ? `<div class="metrics">${metrics}</div>` : ""}
          ${r.chart ? chartCanvas(r.chart) : ""}
          ${r.note ? `<div class="resnote">${r.note}</div>` : ""}
        </div></div>`;
    }
    return "";
  }

  function renderDataPeek(d) {
    if (!d) return "";
    const cols = (d.columns || []).map(c => `<th>${c}</th>`).join("");
    const rows = (d.rows || []).map(r => `<tr>${(r || []).map(x => `<td>${x}</td>`).join("")}</tr>`).join("");
    const table = cols ? `<div class="scroll"><table><thead><tr>${cols}</tr></thead><tbody>${rows}</tbody></table></div>` : "";
    return `<div class="datapeek"><div class="dpcap">📊 ${d.caption || "What the data looks like"}</div>${table}${d.note ? `<div class="dpnote">${d.note}</div>` : ""}</div>`;
  }
  function renderSymbols(syms) {
    if (!syms || !syms.length) return "";
    const rows = syms.map(s => `<tr><td class="sym">${s.sym}</td><td>${s.desc}</td></tr>`).join("");
    return `<div class="symbox"><div class="symcap">🔤 What the symbols mean</div><table class="symt">${rows}</table></div>`;
  }
  function richBlocks(st) {
    return (st.insight ? `<div class="insight">💡 ${st.insight}</div>` : "") +
      renderDataPeek(st.data) +
      (st.chart ? chartCanvas(st.chart) : "") +
      renderSymbols(st.symbols);
  }

  function renderLab() {
    chartReg = [];
    const stages = cur.stages || [];
    const st = stages[stageIdx];
    const phases = `<div class="phasebar">` + stages.map((s, i) =>
      `<span class="ph ${i === stageIdx ? "active" : ""} ${i < stageIdx ? "done" : ""}" onclick="Sim.goto(${i})">
        <span class="pn">${i + 1}</span>${s.icon || ""} ${esc(s.phase || s.title || ("Stage " + (i + 1)))}</span>`).join("") + `</div>`;

    const steps = (st.steps || []).map((s, i) => renderStepHtml(s, i)).join("");
    const body = `<div class="lab">
      <div>
        <div class="stage">
          <div class="ptag">${esc(st.phase || "")} · step ${stageIdx + 1} of ${stages.length}</div>
          <h3>${st.icon || ""} ${esc(st.title || st.phase || "")}</h3>
          <div class="narr">${st.narrative || ""}</div>
          ${richBlocks(st)}
          ${steps}
        </div>
        <div class="navrow">
          <button ${stageIdx === 0 ? "disabled" : ""} onclick="Sim.goto(${stageIdx - 1})">← Back</button>
          <button class="primary" ${stageIdx >= stages.length - 1 ? "disabled" : ""} onclick="Sim.goto(${stageIdx + 1})">Next step →</button>
        </div>
      </div>
      ${conceptPanel(st)}
    </div>`;

    document.getElementById("view").innerHTML =
      `<div class="labhead"><div class="ic">${cur.icon || "🛠️"}</div>
        <div><h2>${esc(cur.title)}</h2><div class="gl">${esc(cur.goal || "")}</div></div>
        <button class="close" onclick="Sim.close()">✕ All projects</button></div>` +
      phases + body;
    drawAllCharts();
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([document.getElementById("view")]);
  }

  function goto(i) { const n = (cur.stages || []).length; stageIdx = Math.max(0, Math.min(n - 1, i)); renderLab(); window.scrollTo(0, 0); pushURL(); }

  // ---- URL <-> state, so the browser Back/Forward buttons walk lab stages ----
  function stateHash() { return cur ? ("#" + cur._id + (stageIdx > 0 ? "/" + stageIdx : "")) : ""; }
  function pushURL() {
    const h = stateHash();
    if (h === location.hash) return;                 // no change -> no duplicate history entry
    history.pushState(null, "", h || (location.pathname + location.search));
  }
  function applyHash() {
    const raw = location.hash.replace(/^#/, "");
    if (!raw) { cur = null; renderPicker(); window.scrollTo(0, 0); return; }
    const slash = raw.indexOf("/");
    const id = slash === -1 ? raw : raw.slice(0, slash);
    const sIdx = slash === -1 ? 0 : (parseInt(raw.slice(slash + 1), 10) || 0);
    if ((window.SIMULATIONS || {})[id]) {
      cur = window.SIMULATIONS[id]; cur._id = id;
      const n = (cur.stages || []).length;
      stageIdx = Math.max(0, Math.min(n - 1, sIdx));
      renderLab(); window.scrollTo(0, 0);
    } else { cur = null; renderPicker(); }
  }
  function choose(si, oi) {
    const step = cur.stages[stageIdx].steps[si];
    const wrap = document.getElementById("step-" + si);
    wrap.querySelectorAll(".opt").forEach((el, k) => {
      el.classList.toggle("chosen", k === oi);
      el.classList.add("revealed");
    });
  }
  function run(si) {
    const res = document.getElementById("res-" + si);
    res.classList.add("show");
    const btn = document.querySelector("#step-" + si + " .runbtn");
    if (btn) { btn.disabled = true; btn.textContent = "✓ done"; }
  }
  function syncTheme(){ const b=document.getElementById("themeToggle"); b.textContent=theme()==="light"?"🌙":"☀️"; }
  function toggleTheme(){ const n=theme()==="light"?"dark":"light"; document.documentElement.setAttribute("data-theme",n); try{localStorage.setItem("mlmath_theme",n)}catch(e){} syncTheme(); }

  function init() {
    (window.LESSONS || []).forEach(l => L[l.id] = l);
    syncTheme();
    applyHash();
    window.addEventListener("popstate", applyHash);
  }
  window.addEventListener("DOMContentLoaded", init);
  return { open, close, goto, choose, run, toggleTheme };
})();
window.Sim = Sim;
</script>
