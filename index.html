<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ML Math Tutor — Learn the Maths of Machine Learning from Scratch</title>

<!-- Apply saved theme BEFORE first paint, so there is no flash of the wrong theme. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("mlmath_theme");
      if (t !== "light" && t !== "dark") {
        t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();
</script>

<!-- MathJax (renders the $...$ and $$...$$ formulas). Needs internet the first time. -->
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    svg: { fontCache: 'global' },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
  :root {
    --bg: #0f1419;
    --panel: #161c24;
    --panel-2: #1d2530;
    --ink: #e6edf3;
    --ink-dim: #9aa7b4;
    --accent: #4ea1ff;
    --accent-2: #7ee787;
    --warn: #ffb454;
    --border: #2a3340;
    --good: #2ea043;
    --purple: #c89bff;
    --deriv: #5ad1c4;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
    --maxw: 860px;
  }
  /* Light theme — overrides the dark defaults above. */
  :root[data-theme="light"] {
    --bg: #f6f8fa;
    --panel: #ffffff;
    --panel-2: #eaeef2;
    --ink: #1f2328;
    --ink-dim: #59636e;
    --accent: #0969da;
    --accent-2: #1a7f37;
    --warn: #9a6700;
    --border: #d0d7de;
    --good: #1a7f37;
    --purple: #8250df;
    --deriv: #0f766e;
    --shadow: 0 6px 20px rgba(140,149,159,.18);
  }
  html { color-scheme: dark; }
  html[data-theme="light"] { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 320px;
    min-width: 320px;
    height: 100vh;
    overflow-y: auto;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 0 0 40px 0;
    position: sticky;
    top: 0;
  }
  #sidebar .brand {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--panel); z-index: 5;
  }
  #sidebar .brand { position: relative; }
  #sidebar .brand h1 { font-size: 17px; margin: 0 0 2px; color: var(--ink); padding-right: 34px; }
  #themeToggle {
    position: absolute; top: 16px; right: 16px;
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
    background: var(--bg); border: 1px solid var(--border); color: var(--ink);
    font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center;
    padding: 0; transition: border-color .15s, background .15s;
  }
  #themeToggle:hover { border-color: var(--accent); }
  #sidebar .brand p { font-size: 12px; margin: 0; color: var(--ink-dim); }
  #search {
    width: 100%; margin-top: 10px; padding: 8px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--ink); font-size: 13px;
  }
  #search::placeholder { color: var(--ink-dim); }

  .module { border-bottom: 1px solid var(--border); }
  .module > .mod-head {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; cursor: pointer; user-select: none;
    font-weight: 600; font-size: 14px;
  }
  .module > .mod-head:hover { background: var(--panel-2); }
  .mod-head .chev { transition: transform .18s ease; color: var(--ink-dim); font-size: 11px; }
  .module.collapsed .chev { transform: rotate(-90deg); }
  .mod-head .modbar {
    margin-left: auto; font-size: 11px; color: var(--ink-dim);
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px;
  }
  .module .lessons { list-style: none; margin: 0; padding: 0 0 8px; }
  .module.collapsed .lessons { display: none; }
  .lessons li {
    padding: 7px 16px 7px 38px; font-size: 13px; cursor: pointer; color: var(--ink-dim);
    display: flex; align-items: center; gap: 8px; line-height: 1.35;
  }
  .lessons li:hover { background: var(--panel-2); color: var(--ink); }
  .lessons li.active { background: rgba(78,161,255,.12); color: var(--ink); border-left: 3px solid var(--accent); padding-left: 35px; }
  .lessons li .dot {
    width: 14px; height: 14px; min-width: 14px; border-radius: 50%;
    border: 1.5px solid var(--border); display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--bg);
  }
  .lessons li.done .dot { background: var(--good); border-color: var(--good); }

  /* ---------- Main ---------- */
  #main { flex: 1; height: 100vh; overflow-y: auto; }
  #content { max-width: var(--maxw); margin: 0 auto; padding: 40px 28px 120px; }

  .crumbs { color: var(--ink-dim); font-size: 12px; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
  h2.lesson-title { font-size: 30px; margin: 0 0 6px; line-height: 1.2; }
  .lesson-sub { color: var(--ink-dim); margin: 0 0 24px; }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; margin: 0 0 18px; box-shadow: var(--shadow);
  }
  .card h3 {
    margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent); display: flex; align-items: center; gap: 8px;
  }
  .card.idea h3 { color: var(--accent-2); }
  .card.example h3 { color: var(--warn); }
  .card.app h3 { color: var(--purple); }
  .card.deriv h3 { color: var(--deriv); }
  .card p:first-of-type { margin-top: 0; }
  .card p:last-child { margin-bottom: 0; }

  .symbols { width: 100%; border-collapse: collapse; margin: 4px 0; }
  .symbols td { padding: 7px 10px; border-top: 1px solid var(--border); vertical-align: top; }
  .symbols td.sym { width: 110px; white-space: nowrap; color: var(--ink); }
  .symbols tr:first-child td { border-top: none; }

  .formula-box {
    background: var(--bg); border: 1px dashed var(--border); border-radius: 10px;
    padding: 6px 14px; margin: 8px 0; overflow-x: auto;
  }

  .steps { counter-reset: step; padding-left: 0; list-style: none; margin: 0; }
  .steps > li {
    position: relative; padding: 4px 0 12px 38px; margin: 0;
    border-left: 2px solid var(--border); margin-left: 11px;
  }
  .steps > li:last-child { border-left: 2px solid transparent; }
  .steps > li::before {
    counter-increment: step; content: counter(step);
    position: absolute; left: -12px; top: 0;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--ink);
    font-size: 11px; display: flex; align-items: center; justify-content: center;
  }

  .quiz { border-left: 3px solid var(--warn); }
  .quiz .reveal {
    margin-top: 8px; color: var(--accent); cursor: pointer; font-size: 13px; user-select: none;
    background: none; border: none; padding: 0; text-decoration: underline;
  }
  .quiz .answer { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .quiz.open .answer { display: block; }

  .card.practice h3 { color: var(--warn); }
  .problem { border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin: 10px 0; background: var(--bg); }
  .problem .qrow { display: flex; gap: 10px; align-items: flex-start; }
  .problem .qnum {
    min-width: 22px; height: 22px; border-radius: 50%; background: var(--panel-2);
    border: 1px solid var(--border); color: var(--ink); font-size: 12px;
    display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .problem .qtext { flex: 1; }
  .problem .reveal {
    margin-top: 8px; color: var(--accent); cursor: pointer; font-size: 13px; user-select: none;
    background: none; border: none; padding: 0; text-decoration: underline;
  }
  .problem .solution { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .problem.open .solution { display: block; }
  .solsteps { counter-reset: ps; list-style: none; margin: 0; padding: 0; }
  .solsteps > li {
    position: relative; padding: 5px 0 12px 32px; margin: 0 0 0 10px; border-left: 2px solid var(--border);
  }
  .solsteps > li:last-child { border-left-color: transparent; padding-bottom: 2px; }
  .solsteps > li::before {
    counter-increment: ps; content: counter(ps); position: absolute; left: -11px; top: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--ink); font-size: 10px; display: flex; align-items: center; justify-content: center;
  }
  .solsteps .do { color: var(--ink); }
  .solsteps .why { color: var(--ink-dim); font-size: 13.5px; margin-top: 2px; }
  .finalans { margin-top: 10px; color: var(--accent-2); font-weight: 600; }

  .prereqs { font-size: 13px; color: var(--ink-dim); margin-bottom: 18px; }
  .prereqs a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .prereqs a:hover { text-decoration: underline; }

  code, .mono { font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; font-size: 13.5px; }
  pre {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; overflow-x: auto; font-size: 13px;
  }
  .tag {
    display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--ink-dim); margin-right: 6px;
  }

  .nav-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 30px; }
  .nav-row button {
    flex: 1; background: var(--panel); color: var(--ink); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; cursor: pointer; text-align: left; font-size: 13px;
  }
  .nav-row button:hover { border-color: var(--accent); }
  .nav-row button.next { text-align: right; }
  .nav-row button span { display: block; color: var(--ink-dim); font-size: 11px; }
  .nav-row button:disabled { opacity: .35; cursor: default; }

  .markdone {
    margin-top: 22px; display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border); color: var(--ink);
    border-radius: 10px; padding: 9px 14px; cursor: pointer; font-size: 13px;
  }
  .markdone.done { border-color: var(--good); color: var(--accent-2); }

  .demo { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 8px; }
  .demo label { font-size: 12px; color: var(--ink-dim); display: block; margin: 8px 0 2px; }
  .demo input[type=range] { width: 100%; }
  .demo .out { font-family: ui-monospace, monospace; color: var(--accent-2); }
  .demo canvas { width: 100%; background: var(--panel); border-radius: 8px; margin-top: 8px; }

  a.inlink { color: var(--accent); cursor: pointer; text-decoration: none; }
  a.inlink:hover { text-decoration: underline; }

  #welcome h2 { font-size: 32px; margin-top: 0; }
  #welcome .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 20px; }
  #welcome .grid .card { margin: 0; cursor: default; }

  .hl { color: var(--accent-2); }
  .hint { color: var(--ink-dim); font-size: 13px; }

  #menuToggle { display: none; }
  @media (max-width: 820px) {
    #sidebar { position: fixed; z-index: 50; transform: translateX(-100%); transition: transform .2s; box-shadow: var(--shadow); }
    body.nav-open #sidebar { transform: translateX(0); }
    #menuToggle {
      display: flex; position: fixed; top: 12px; left: 12px; z-index: 60;
      background: var(--panel); border: 1px solid var(--border); color: var(--ink);
      border-radius: 8px; padding: 8px 12px; cursor: pointer;
    }
    #content { padding-top: 60px; }
  }
</style>
</head>
<body>
<button id="menuToggle" onclick="document.body.classList.toggle('nav-open')">☰ Menu</button>

<nav id="sidebar">
  <div class="brand">
    <button id="themeToggle" title="Toggle light / dark theme" aria-label="Toggle theme" onclick="Theme.toggle()"></button>
    <h1>📐 ML Math Tutor</h1>
    <p>The maths of ML, DL & AI — from zero.</p>
    <input id="search" placeholder="Search lessons…" oninput="App.filter(this.value)" />
  </div>
  <div id="modules"></div>
</nav>

<main id="main">
  <div id="content"></div>
</main>

<!-- Global lesson registry. Each lessons/*.js file pushes into this. -->
<script>
  window.LESSONS = [];
  // Derivation / proof / intuition text, keyed by lesson id. Filled by lessons/derivations-*.js.
  window.DERIVATIONS = {};
  // Practice problems (array per lesson id). Filled by lessons/practice-*.js.
  window.PRACTICE = {};
  // Order the modules appear in the sidebar:
  window.MODULE_ORDER = [
    "Foundations: Math you need first",
    "Probability & Statistics",
    "Machine Learning (CS229)",
    "Deep Learning (CS230)",
    "Artificial Intelligence (CS221)"
  ];
</script>

<!-- Content files. Plain <script src> works directly from file:// (no server needed). -->
<script src="lessons/00-foundations.js"></script>
<script src="lessons/01-probability.js"></script>
<script src="lessons/02-ml.js"></script>
<script src="lessons/03-deeplearning.js"></script>
<script src="lessons/04-ai.js"></script>

<!-- Derivations / proofs / intuition (merged into lessons by id). -->
<script src="lessons/derivations-00-foundations.js"></script>
<script src="lessons/derivations-01-probability.js"></script>
<script src="lessons/derivations-02-ml.js"></script>
<script src="lessons/derivations-03-deeplearning.js"></script>
<script src="lessons/derivations-04-ai.js"></script>

<!-- Practice problems with step-by-step solutions (merged into lessons by id). -->
<script src="lessons/practice-00-foundations.js"></script>
<script src="lessons/practice-01-probability-a.js"></script>
<script src="lessons/practice-01-probability-b.js"></script>
<script src="lessons/practice-02-ml-a.js"></script>
<script src="lessons/practice-02-ml-b.js"></script>
<script src="lessons/practice-02-ml-c.js"></script>
<script src="lessons/practice-03-deeplearning-a.js"></script>
<script src="lessons/practice-03-deeplearning-b.js"></script>
<script src="lessons/practice-03-deeplearning-c.js"></script>
<script src="lessons/practice-04-ai-a.js"></script>
<script src="lessons/practice-04-ai-b.js"></script>

<!-- Light / dark theme toggle, persisted in localStorage. -->
<script>
const Theme = (function () {
  var KEY = "mlmath_theme";
  function current() { return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark"; }
  function apply(t) {
    document.documentElement.setAttribute("data-theme", t);
    try { localStorage.setItem(KEY, t); } catch (e) {}
    var btn = document.getElementById("themeToggle");
    if (btn) {
      // Show the icon of the mode you'd switch TO.
      btn.textContent = (t === "light") ? "🌙" : "☀️";
      btn.title = (t === "light") ? "Switch to dark theme" : "Switch to light theme";
    }
  }
  function toggle() { apply(current() === "light" ? "dark" : "light"); }
  function init() { apply(current()); }   // sync the button icon to the already-applied theme
  return { toggle, init };
})();
window.addEventListener("DOMContentLoaded", Theme.init);
</script>

<!-- The engine. Defined last so all lessons are registered. -->
<script>
const App = (function () {
  const byId = {};
  const order = [];           // flat lesson order for prev/next
  const LS_KEY = "mlmath_progress_v1";
  let progress = {};
  try { progress = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch (e) { progress = {}; }

  function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(progress)); } catch (e) {} }

  // ---- Build module -> lessons structure, preserving file/push order within a module ----
  function group() {
    const mods = {};
    LESSONS.forEach(l => { (mods[l.module] = mods[l.module] || []).push(l); l && (byId[l.id] = l); });
    const names = Object.keys(mods).sort((a, b) => {
      const ia = MODULE_ORDER.indexOf(a), ib = MODULE_ORDER.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
    return names.map(n => ({ name: n, lessons: mods[n] }));
  }

  function renderSidebar() {
    const groups = group();
    const wrap = document.getElementById("modules");
    wrap.innerHTML = "";
    order.length = 0;
    groups.forEach((g, gi) => {
      const done = g.lessons.filter(l => progress[l.id]).length;
      const mod = document.createElement("div");
      mod.className = "module" + (gi === 0 ? "" : " collapsed");
      mod.innerHTML =
        `<div class="mod-head"><span class="chev">▼</span><span>${g.name}</span>` +
        `<span class="modbar" data-mod="${g.name}">${done}/${g.lessons.length}</span></div>` +
        `<ul class="lessons"></ul>`;
      const ul = mod.querySelector(".lessons");
      g.lessons.forEach(l => {
        order.push(l.id);
        const li = document.createElement("li");
        li.dataset.id = l.id;
        li.dataset.search = (l.title + " " + (l.module || "")).toLowerCase();
        li.className = progress[l.id] ? "done" : "";
        li.innerHTML = `<span class="dot">✓</span><span>${l.title}</span>`;
        li.onclick = () => { open(l.id); if (window.innerWidth <= 820) document.body.classList.remove("nav-open"); };
        ul.appendChild(li);
      });
      mod.querySelector(".mod-head").onclick = (e) => {
        if (e.target.closest(".modbar")) return;
        mod.classList.toggle("collapsed");
      };
      wrap.appendChild(mod);
    });
  }

  function updateBars() {
    const groups = group();
    document.querySelectorAll(".modbar").forEach(b => {
      const g = groups.find(x => x.name === b.dataset.mod);
      if (g) b.textContent = g.lessons.filter(l => progress[l.id]).length + "/" + g.lessons.length;
    });
    document.querySelectorAll(".lessons li").forEach(li => {
      li.classList.toggle("done", !!progress[li.dataset.id]);
    });
  }

  function symbolsTable(symbols) {
    if (!symbols || !symbols.length) return "";
    const rows = symbols.map(s => `<tr><td class="sym">${s.sym}</td><td>${s.desc}</td></tr>`).join("");
    return `<div class="card"><h3>🔤 Every symbol, in plain English</h3><table class="symbols">${rows}</table></div>`;
  }

  function prereqLinks(prereqs) {
    if (!prereqs || !prereqs.length) return "";
    const links = prereqs.map(id => byId[id]
      ? `<a onclick="App.open('${id}')">${byId[id].title}</a>` : null).filter(Boolean).join(", ");
    if (!links) return "";
    return `<div class="prereqs">🧩 <b>Best to read first:</b> ${links}</div>`;
  }

  function quizBlock(quiz) {
    if (!quiz) return "";
    return `<div class="card quiz"><h3>🧠 Check yourself</h3><p>${quiz.q}</p>` +
      `<button class="reveal" onclick="this.parentElement.classList.toggle('open')">Show answer ▾</button>` +
      `<div class="answer">${quiz.a}</div></div>`;
  }

  function practiceBlock(list) {
    if (!list || !list.length) return "";
    const probs = list.map((p, i) => {
      const steps = (p.steps || []).map(s =>
        `<li><div class="do">${s.do || ""}</div>${s.why ? `<div class="why">${s.why}</div>` : ""}</li>`).join("");
      return `<div class="problem">
          <div class="qrow"><span class="qnum">${i + 1}</span><div class="qtext">${p.q}</div></div>
          <button class="reveal" onclick="this.closest('.problem').classList.toggle('open'); App.typeset(this.closest('.problem'));">Show step-by-step solution ▾</button>
          <div class="solution"><ol class="solsteps">${steps}</ol>${p.answer ? `<div class="finalans">✅ Answer: ${p.answer}</div>` : ""}</div>
        </div>`;
    }).join("");
    return `<div class="card practice"><h3>✏️ Practice — ${list.length} problems</h3>` +
      `<p class="hint">Try each one yourself first, then reveal the worked solution. Every step says <i>what</i> to do and <i>why</i>.</p>` +
      probs + `</div>`;
  }

  function section(cls, icon, label, html) {
    if (!html) return "";
    return `<div class="card ${cls}"><h3>${icon} ${label}</h3>${html}</div>`;
  }

  function open(id) {
    const l = byId[id];
    if (!l) return;
    const idx = order.indexOf(id);
    const prev = order[idx - 1], next = order[idx + 1];

    const html =
      `<div class="crumbs">${l.module}</div>` +
      `<h2 class="lesson-title">${l.title}</h2>` +
      (l.tagline ? `<p class="lesson-sub">${l.tagline}</p>` : "") +
      prereqLinks(l.prereqs) +
      section("idea", "💡", "The big idea", l.bigIdea) +
      section("", "🪜", "Building up to it", l.buildup) +
      symbolsTable(l.symbols) +
      (l.formula ? `<div class="card"><h3>➗ The formula</h3><div class="formula-box">${l.formula}</div>${l.whatItDoes ? l.whatItDoes : ""}</div>` : (l.whatItDoes ? section("", "➗", "What it does", l.whatItDoes) : "")) +
      section("deriv", "📜", "Why it's true — derivation &amp; intuition", l.derivation) +
      (l.demo ? `<div class="card"><h3>🎛️ Play with it</h3><div class="demo" id="demo-host"></div></div>` : "") +
      section("example", "🔢", "Concrete example (real numbers)", l.example) +
      section("app", "🚀", "Where you actually use this", l.application) +
      quizBlock(l.quiz) +
      practiceBlock(l.practice) +
      `<button class="markdone ${progress[id] ? 'done' : ''}" onclick="App.toggleDone('${id}')">` +
        `${progress[id] ? '✓ Completed — click to unmark' : 'Mark this lesson complete'}</button>` +
      `<div class="nav-row">` +
        `<button ${prev ? `onclick="App.open('${prev}')"` : "disabled"}><span>← Previous</span>${prev ? byId[prev].title : ""}</button>` +
        `<button class="next" ${next ? `onclick="App.open('${next}')"` : "disabled"}><span>Next →</span>${next ? byId[next].title : ""}</button>` +
      `</div>`;

    const c = document.getElementById("content");
    c.innerHTML = html;
    document.querySelectorAll(".lessons li").forEach(li => li.classList.toggle("active", li.dataset.id === id));
    if (l.demo) { try { l.demo(document.getElementById("demo-host")); } catch (e) { console.warn(e); } }
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([c]);
    document.getElementById("main").scrollTo(0, 0);
    if (history.replaceState) history.replaceState(null, "", "#" + id);
  }

  function toggleDone(id) {
    progress[id] = !progress[id];
    if (!progress[id]) delete progress[id];
    save(); updateBars(); open(id);
  }

  function filter(q) {
    q = (q || "").trim().toLowerCase();
    document.querySelectorAll(".module").forEach(mod => {
      let any = false;
      mod.querySelectorAll(".lessons li").forEach(li => {
        const match = !q || li.dataset.search.includes(q);
        li.style.display = match ? "" : "none";
        if (match) any = true;
      });
      mod.style.display = any ? "" : "none";
      if (q && any) mod.classList.remove("collapsed");
    });
  }

  function welcome() {
    const total = LESSONS.length;
    const done = Object.keys(progress).length;
    document.getElementById("content").innerHTML = `
      <div id="welcome">
        <div class="crumbs">Start here</div>
        <h2>Learn the maths behind ML, Deep Learning & AI 🧠</h2>
        <p class="lesson-sub">Every formula from the Stanford / MIT cheat sheets — rebuilt as
        plain-English lessons. Short sentences. Every symbol explained. A worked example with real
        numbers, and where each idea is used in the real world.</p>
        <p>You have <b class="hl">${total}</b> lessons. Completed: <b class="hl">${done}</b>.
        Pick a topic on the left, or start at the very beginning 👇</p>
        <div class="grid">
          ${group().map(g => `<div class="card"><h3>📦 ${g.name}</h3>
             <p class="hint">${g.lessons.length} lessons.</p>
             <a class="inlink" onclick="App.open('${g.lessons[0].id}')">Start →</a></div>`).join("")}
        </div>
        <p style="margin-top:24px" class="hint">Tip: your progress is saved in this browser automatically.
        Formulas are rendered by MathJax (needs internet the first load).</p>
      </div>`;
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
  }

  function boot() {
    if (!LESSONS.length) {
      document.getElementById("content").innerHTML =
        "<p style='color:#ffb454'>No lessons loaded. Make sure the <code>lessons/*.js</code> files are next to this page.</p>";
      return;
    }
    // Merge derivation text + practice problems into lessons by id.
    LESSONS.forEach(l => {
      if (!l.derivation && window.DERIVATIONS && DERIVATIONS[l.id]) l.derivation = DERIVATIONS[l.id];
      if (!l.practice && window.PRACTICE && PRACTICE[l.id]) l.practice = PRACTICE[l.id];
    });
    renderSidebar();
    const hash = location.hash.replace("#", "");
    if (hash && byId[hash]) open(hash); else welcome();
  }

  function typeset(el) { if (el && window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]); }

  return { boot, open, toggleDone, filter, typeset };
})();
window.addEventListener("DOMContentLoaded", App.boot);
</script>
</body>
</html>
