<!-- Apply saved theme BEFORE first paint, so there is no flash of the wrong theme. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("mlmath_theme");
      // Default to the light, textbook-style reading view; honour a saved choice if there is one.
      if (t !== "light" && t !== "dark") t = "light";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  })();
</script>

<!-- Real machine-learning libraries that power authentic "watch it actually compute" demos.
     They load from a CDN and expose globals: tf, mlMatrix, ss. Every demo guards on their
     presence (window.tf / window.mlMatrix / window.ss) and falls back to a plain-canvas
     drawing if a library hasn't loaded or you're offline, so nothing breaks. -->

<style>
  :root {
    --bg: #0f1419;
    --panel: #161c24;
    --panel-2: #1d2530;
    --ink: #e6edf3;
    --ink-dim: #9aa7b4;
    --accent: #4ea1ff;
    --accent-2: #7ee787;
    --warn: #ffb454;
    --border: #2a3340;
    --good: #2ea043;
    --purple: #c89bff;
    --deriv: #5ad1c4;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
    --maxw: 860px;
  }
  /* Light theme — overrides the dark defaults above. */
  :root[data-theme="light"] {
    --bg: #f6f8fa;
    --panel: #ffffff;
    --panel-2: #eaeef2;
    --ink: #1f2328;
    --ink-dim: #59636e;
    --accent: #0969da;
    --accent-2: #1a7f37;
    --warn: #9a6700;
    --border: #d0d7de;
    --good: #1a7f37;
    --purple: #8250df;
    --deriv: #0f766e;
    --shadow: 0 6px 20px rgba(140,149,159,.18);
  }
  html { color-scheme: dark; }
  html[data-theme="light"] { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 320px;
    min-width: 320px;
    height: 100vh;
    overflow-y: auto;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 52px 0 40px 0;
    position: sticky;
    top: 0;
    transition: min-width .2s ease, width .2s ease, transform .2s ease;
  }
  #sidebar .brand {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--panel); z-index: 5;
  }
  #sidebar .brand { position: relative; }
  #sidebar .brand h1 { font-size: 17px; margin: 0 0 2px; color: var(--ink); padding-right: 34px; }
  #themeToggle {
    position: absolute; top: 16px; right: 16px;
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
    background: var(--bg); border: 1px solid var(--border); color: var(--ink);
    font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center;
    padding: 0; transition: border-color .15s, background .15s;
  }
  #themeToggle:hover { border-color: var(--accent); }
  #sidebar .brand p { font-size: 12px; margin: 0; color: var(--ink-dim); }
  #search {
    width: 100%; margin-top: 10px; padding: 8px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--ink); font-size: 13px;
  }
  #search::placeholder { color: var(--ink-dim); }

  .module { border-bottom: 1px solid var(--border); }
  .module > .mod-head {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; cursor: pointer; user-select: none;
    font-weight: 600; font-size: 14px;
  }
  .module > .mod-head:hover { background: var(--panel-2); }
  .mod-head .chev { transition: transform .18s ease; color: var(--ink-dim); font-size: 11px; }
  .module.collapsed .chev { transform: rotate(-90deg); }
  .mod-head .modbar {
    margin-left: auto; font-size: 11px; color: var(--ink-dim);
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px;
  }
  .module .lessons { list-style: none; margin: 0; padding: 0 0 8px; }
  .module.collapsed .lessons { display: none; }
  /* Supergroup: a top-level umbrella (e.g. "Math") wrapping several module sections. */
  .supergroup { border-bottom: 1px solid var(--border); }         /* closes the collapsed group */
  .supergroup:not(.collapsed) { border-bottom: none; }            /* expanded: the last child's own border closes it (avoids a doubled line) */
  .supergroup > .sg-head {
    display: flex; align-items: center; gap: 8px;
    padding: 13px 16px; cursor: pointer; user-select: none;
    font-weight: 700; font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink); background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }
  .supergroup > .sg-head:hover { background: var(--border); }
  .sg-head .chev { transition: transform .18s ease; color: var(--ink-dim); font-size: 11px; }
  .supergroup.collapsed > .sg-head { border-bottom: none; }
  .supergroup.collapsed > .sg-head .chev { transform: rotate(-90deg); }
  .supergroup.collapsed > .sg-body { display: none; }
  /* Child sections keep the same bottom divider as top-level modules — every one,
     including the last, so no secondary item ever looks border-less. */
  .supergroup > .sg-body > .module > .mod-head { padding-left: 28px; font-weight: 500; }
  .supergroup > .sg-body > .module .lessons li a.navlink { padding-left: 50px; }
  .lessons li { display: block; }
  .lessons li a.navlink {
    padding: 7px 16px 7px 38px; font-size: 13px; cursor: pointer; color: var(--ink-dim);
    display: flex; align-items: center; gap: 8px; line-height: 1.35; text-decoration: none;
  }
  .lessons li a.navlink:hover { background: var(--panel-2); color: var(--ink); }
  .lessons li.active a.navlink { background: rgba(78,161,255,.12); color: var(--ink); border-left: 3px solid var(--accent); padding-left: 35px; }
  .lessons li a.navlink .ltitle { flex: 1; min-width: 0; }
  .usebadge {
    min-width: 21px; height: 17px; padding: 0 5px; border-radius: 4px;
    font-size: 10px; font-weight: 700; line-height: 17px; text-align: center;
    flex: 0 0 auto; font-variant-numeric: tabular-nums; color: #fff;
  }
  .usage-legend { font-size: 11px; color: var(--ink-dim); margin: 8px 0 0; line-height: 1.4; }
  .usage-legend b { color: var(--ink); font-weight: 600; }
  .nav-extra { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .nav-extra a {
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
    text-decoration: none; font-size: 13px; font-weight: 600;
    background: var(--bg); border: 1px solid var(--border); color: var(--ink);
    border-radius: 8px; padding: 8px 12px;
  }
  .nav-extra a:hover { border-color: var(--accent); color: var(--accent); }
  .lesson-links { margin: -6px 0 16px; font-size: 13px; }
  .app-uses { margin: 12px 0 0; padding-top: 10px; border-top: 1px solid var(--border); font-size: 13.5px; }
  .app-uses b { color: var(--ink); }

  /* ---------- Main ---------- */
  #main { flex: 1; height: 100vh; overflow-y: auto; }
  #content { max-width: var(--maxw); margin: 0 auto; padding: 40px 28px 120px; }

  .crumbs { color: var(--ink-dim); font-size: 12px; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
  h2.lesson-title { font-size: 30px; margin: 0 0 6px; line-height: 1.2; }
  .lesson-sub { color: var(--ink-dim); margin: 0 0 24px; }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; margin: 0 0 18px; box-shadow: var(--shadow);
  }
  .card h3 {
    margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent); display: flex; align-items: center; gap: 8px;
  }
  .card.idea h3 { color: var(--accent-2); }
  .card.example h3 { color: var(--warn); }
  .card.app h3 { color: var(--purple); }
  .card.deriv h3 { color: var(--deriv); }
  /* Implementation-first practitioner callouts */
  .card.whenuse { border-left: 3px solid var(--accent); }
  .card.whenuse h3 { color: var(--accent); }
  .card.pitfalls { border-left: 3px solid var(--warn); background: color-mix(in srgb, var(--warn) 5%, var(--panel)); }
  .card.pitfalls h3 { color: var(--warn); }
  .colab-btn {
    display: inline-flex; align-items: center; gap: 6px; margin: 2px 0 14px;
    padding: 4px 9px; border-radius: 8px; font-size: 12px; font-weight: 600;
    text-decoration: none; color: var(--ink-dim); background: transparent;
    border: 1px solid var(--border); transition: color .15s, border-color .15s;
  }
  .colab-btn:hover { color: var(--ink); border-color: var(--accent); }
  .card.playbook { border-left: 3px solid var(--accent-2); }
  .card.playbook h3 { color: var(--accent-2); }
  .card.checklist { border-left: 3px solid var(--accent-2); background: color-mix(in srgb, var(--accent-2) 6%, var(--panel)); }
  .card.checklist h3 { color: var(--accent-2); }
  /* "Under the hood" — a non-collapsible divider before the math/theory sections */
  .uh-divider {
    display: flex; align-items: center; gap: 9px; margin: 26px 2px 14px;
    font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink-dim); border-top: 1px solid var(--border); padding-top: 18px;
  }
  .uh-divider .uh-ic { font-size: 16px; }
  .card p:first-of-type { margin-top: 0; }
  .card p:last-child { margin-bottom: 0; }

  .symbols { width: 100%; border-collapse: collapse; margin: 4px 0; }
  .symbols td { padding: 7px 10px; border-top: 1px solid var(--border); vertical-align: top; }
  .symbols td.sym { width: 110px; white-space: nowrap; color: var(--ink); }
  .symbols tr:first-child td { border-top: none; }

  .formula-box {
    background: var(--bg); border: 1px dashed var(--border); border-radius: 10px;
    padding: 6px 14px; margin: 8px 0; overflow-x: auto;
  }

  .steps { counter-reset: step; padding-left: 0; list-style: none; margin: 0; }
  .steps > li {
    position: relative; padding: 4px 0 12px 38px; margin: 0;
    border-left: 2px solid var(--border); margin-left: 11px;
  }
  .steps > li:last-child { border-left: 2px solid transparent; }
  .steps > li::before {
    counter-increment: step; content: counter(step);
    position: absolute; left: -12px; top: 0;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--ink);
    font-size: 11px; display: flex; align-items: center; justify-content: center;
  }

  .quiz { border-left: 3px solid var(--warn); }
  .quiz .reveal {
    margin-top: 8px; color: var(--accent); cursor: pointer; font-size: 13px; user-select: none;
    background: none; border: none; padding: 0; text-decoration: underline;
  }
  .quiz .answer { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .quiz.open .answer { display: block; }

  /* ---- PyTorch course template: API table, code walkthrough, cheat-sheet ---- */
  .api-table { width: 100%; border-collapse: collapse; margin: 4px 0; }
  .api-table td { padding: 9px 10px; border-top: 1px solid var(--border); vertical-align: top; }
  .api-table tr:first-child td { border-top: none; }
  .api-table td.api-sig { width: 38%; white-space: normal; }
  .api-table td.api-sig code { color: var(--accent); font-weight: 600; }
  .api-eg { margin: 7px 0 0; background: var(--bg); border-radius: 8px; padding: 6px 10px; overflow-x: auto; }
  .api-eg code { color: var(--ink-dim); font-size: 12.5px; }
  .tour-step { margin: 0 0 14px; padding: 0 0 13px; border-bottom: 1px solid var(--border); }
  .tour-step:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .tour-explain { margin-bottom: 8px; }
  .tour-out { background: var(--bg); border-left: 3px solid #7ee787; padding: 7px 11px; margin-top: 7px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; white-space: pre-wrap; color: var(--ink-dim); border-radius: 0 8px 8px 0; }
  .cheat-row { display: flex; gap: 14px; align-items: baseline; padding: 7px 0; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .cheat-row:first-child { border-top: none; }
  .cheat-row code { color: var(--accent); white-space: pre-wrap; font-size: 13px; }
  .cheat-note { color: var(--ink-dim); font-size: 13px; }
  .card.objective { border-left: 3px solid var(--accent); }

  .card.practice h3 { color: var(--warn); }
  .problem { border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin: 10px 0; background: var(--bg); }
  .problem .qrow { display: flex; gap: 10px; align-items: flex-start; }
  .problem .qnum {
    min-width: 22px; height: 22px; border-radius: 50%; background: var(--panel-2);
    border: 1px solid var(--border); color: var(--ink); font-size: 12px;
    display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .problem .qtext { flex: 1; }
  .problem .reveal {
    margin-top: 8px; color: var(--accent); cursor: pointer; font-size: 13px; user-select: none;
    background: none; border: none; padding: 0; text-decoration: underline;
  }
  .problem .solution { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .problem.open .solution { display: block; }
  .solsteps { counter-reset: ps; list-style: none; margin: 0; padding: 0; }
  .solsteps > li {
    position: relative; padding: 5px 0 12px 32px; margin: 0 0 0 10px; border-left: 2px solid var(--border);
  }
  .solsteps > li:last-child { border-left-color: transparent; padding-bottom: 2px; }
  .solsteps > li::before {
    counter-increment: ps; content: counter(ps); position: absolute; left: -11px; top: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--ink); font-size: 10px; display: flex; align-items: center; justify-content: center;
  }
  .solsteps .do { color: var(--ink); }
  .solsteps .why { color: var(--ink-dim); font-size: 13.5px; margin-top: 2px; }
  .finalans { margin-top: 10px; color: var(--accent-2); font-weight: 600; }

  .prereqs { font-size: 13px; color: var(--ink-dim); margin-bottom: 18px; }
  .prereqs a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .prereqs a:hover { text-decoration: underline; }

  code, .mono { font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; font-size: 13.5px; }
  pre {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; overflow-x: auto; font-size: 13px;
  }
  .tag {
    display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 10px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--ink-dim); margin-right: 6px;
  }

  .nav-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 30px; }
  .nav-row button {
    flex: 1; background: var(--panel); color: var(--ink); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; cursor: pointer; text-align: left; font-size: 13px;
  }
  .nav-row button:hover { border-color: var(--accent); }
  .nav-row button.next { text-align: right; }
  .nav-row button span { display: block; color: var(--ink-dim); font-size: 11px; }
  .nav-row button:disabled { opacity: .35; cursor: default; }

  .markdone {
    margin-top: 22px; display: inline-flex; align-items: center; gap: 8px;

  .code .codebtn:hover { border-color: var(--accent); color: #fff; }

  /* Floating collapse/expand toggle — shown on ALL screen sizes. */
  #menuToggle {
    display: flex; align-items: center; gap: 6px; position: fixed; top: 12px; left: 12px; z-index: 60;

    border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px; line-height: 1;
    box-shadow: var(--shadow);
  }

  /* Collapsed: hide the sidebar everywhere; on desktop it animates its width to 0 and the main pane fills. */
  body.nav-collapsed #sidebar { min-width: 0; width: 0; overflow: hidden; border-right: none; }

  @media (max-width: 820px) {
    /* On phones the sidebar overlays the page and slides in/out instead of taking layout space. */

    #content { padding-top: 60px; }

  /* ===================================================================
     TEXTBOOK READING MODE — the lesson pane (#content) reads like a book:
     monochrome text, sections separated by spacing under a plain header,
     no boxes / containers / coloured section icons. Diagrams & charts
     (canvas) and code snippets (syntax highlighting) keep their colours.
     =================================================================== */
  #content {
    max-width: 720px; padding: 60px 32px 160px; font-size: 17px;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, Cambria, "Times New Roman", serif;
    line-height: 1.7;
  }
  #content .crumbs { color: var(--ink-dim); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #content h2.lesson-title { font-size: 34px; font-weight: 700; line-height: 1.18; letter-spacing: -.012em; margin: 0 0 10px; }
  #content .lesson-sub { font-size: 18px; font-style: italic; color: var(--ink-dim); margin: 0 0 40px; }

  /* Every content "card" becomes a plain section: a header, then prose, then space. */
  #content .card { background: none; border: none; border-left: none; border-radius: 0;
    box-shadow: none; padding: 0; margin: 0 0 38px; }
  #content .card h3 { display: block; color: var(--ink); text-transform: none; letter-spacing: 0;
    font-weight: 700; font-size: 22px; line-height: 1.3; margin: 0 0 14px; }
  /* kill every coloured section-header / tinted-box / coloured-rule variant */
  #content .card.idea h3, #content .card.example h3, #content .card.app h3, #content .card.deriv h3,
  #content .card.whenuse h3, #content .card.pitfalls h3, #content .card.playbook h3, #content .card.checklist h3,
  #content .card.practice h3, #content .card.walk h3, #content .card.viz h3, #content .card.code h3,
  #content .card.objective h3, #content .card.quiz h3 { color: var(--ink); }
  #content .card.pitfalls, #content .card.checklist, #content .card.quiz { background: none; }
  #content .card p:first-of-type { margin-top: 0; }
  #content p, #content li { color: var(--ink); }

  /* Divider before the math/theory part: a quiet hairline, no icon. */
  #content .uh-divider { color: var(--ink); border-top: 1px solid var(--border); text-transform: none;
    letter-spacing: .01em; font-weight: 700; font-size: 15px; margin: 46px 0 26px; padding-top: 26px; }

  /* Key equations: a centred math block with breathing room — not a dashed box. */
  #content .formula-box { background: none; border: none; border-radius: 0; padding: 4px 0; margin: 12px 0; }

  /* Ruled tables (symbols / API) keep their hairlines, lose the colour. */
  #content .symbols td.sym, #content .api-table td.api-sig code { color: var(--ink); font-weight: 600; }

  /* Worked-example tables: a clean textbook table (sans for tabular figures, ruled rows). */
  #content table.extable {
    border-collapse: collapse; margin: 16px 0; font-size: 15px; line-height: 1.45;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #content table.extable caption { caption-side: top; text-align: left; color: var(--ink-dim);
    font-size: 13.5px; margin-bottom: 6px; font-style: italic; }
  #content table.extable th, #content table.extable td {
    padding: 6px 16px 6px 0; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top;
  }
  #content table.extable thead th { font-weight: 700; color: var(--ink); border-bottom: 2px solid var(--ink); }
  #content table.extable tbody tr:last-child td { border-bottom: none; }

    border-top: 1px solid var(--border); }

  #content .problem .reveal, #content .quiz .reveal, #content .solsteps .why { color: var(--ink-dim); }
  #content .finalans { color: var(--ink); }

  #content .partof, #content .conceptlink, #content .recall, #content .card.recall {
    background: none; border: none; border-left: none; border-radius: 0; padding: 0; }

  #content .prereqs a, #content .partof a, #content .conceptlink a { color: var(--ink); text-decoration: underline; }

</style>

<!-- Light / dark theme toggle, persisted in localStorage. -->
<script>
const Theme = (function () {
  var KEY = "mlmath_theme";
  function current() { return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark"; }
  function apply(t) {
    document.documentElement.setAttribute("data-theme", t);
    try { localStorage.setItem(KEY, t); } catch (e) {}
    var btn = document.getElementById("themeToggle");
    if (btn) {
      // Show the icon of the mode you'd switch TO.
      btn.textContent = (t === "light") ? "🌙" : "☀️";
      btn.title = (t === "light") ? "Switch to dark theme" : "Switch to light theme";
    }
  }
  function toggle() { apply(current() === "light" ? "dark" : "light"); }
  function init() { apply(current()); }   // sync the button icon to the already-applied theme
  return { toggle, init };
})();
window.addEventListener("DOMContentLoaded", Theme.init);
</script>

<!-- The engine. Defined last so all lessons are registered. -->
<script>
const App = (function () {
  const byId = {};
  const order = [];           // flat lesson order for prev/next
  const APP_INDEX = {};       // lessonId -> [{id,name,icon}] real-world applications that use it
  function buildAppIndex() {
    (window.APPLICATIONS || []).forEach(a => {
      (a.lessons || []).forEach(x => {
        (APP_INDEX[x.id] = APP_INDEX[x.id] || []).push({ id: a.id, name: a.name, icon: a.icon });
      });
    });
  }
  const LS_KEY = "mlmath_progress_v1";
  let progress = {};
  try { progress = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch (e) { progress = {}; }

  function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(progress)); } catch (e) {} }

  // ---- Build module -> lessons structure, preserving file/push order within a module ----
  function modOf(l) { return (window.MODULE_MERGE && MODULE_MERGE[l.module]) || l.module; }
  function group() {
    const mods = {};
    LESSONS.forEach(l => { const m = modOf(l); (mods[m] = mods[m] || []).push(l); l && (byId[l.id] = l); });
    const names = Object.keys(mods).sort((a, b) => {
      const ia = MODULE_ORDER.indexOf(a), ib = MODULE_ORDER.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
    return names.map(n => ({ name: n, lessons: mods[n] }));
  }

  // Nest sections under collapsible umbrella groups in the sidebar. The lesson's own
  // `module` is unchanged. Two rule-based umbrellas:
  //  • "Course"  — every taught section from Foundations through PyTorch
  //                (i.e. everything in MODULE_ORDER before Capstones).
  //  • "Papers"  — the Capstones plus every "Papers · …" category.
  // (A third, "Math", is assigned per-lesson via the `superGroup` field.)
  function superGroupOf(name) {
    if (name === "Capstones" || /^Papers\s*·/.test(name)) return "Papers";
    const i = MODULE_ORDER.indexOf(name), cap = MODULE_ORDER.indexOf("Capstones");
    if (i !== -1 && cap !== -1 && i < cap) return "Course";
    return null;
  }
  // Under the "Papers" parent, drop the redundant "Papers · " prefix from a
  // child's label so it reads e.g. "Papers › Foundations & Optimization".
  function navLabel(name, sgName) {
    return sgName === "Papers" ? name.replace(/^Papers\s*·\s*/, "") : name;
  }

  function renderSidebar() {
    const groups = group();
    const wrap = document.getElementById("modules");
    wrap.innerHTML = "";
    order.length = 0;
    const superBodies = {};   // superGroup name -> its body element (e.g. "Math")
    groups.forEach((g, gi) => {
      const sgName = (g.lessons[0] && g.lessons[0].superGroup) || superGroupOf(g.name);
      let container = wrap;
      if (sgName) {
        if (!superBodies[sgName]) {
          const sg = document.createElement("div");
          sg.className = "supergroup collapsed";
          sg.innerHTML =
            `<div class="sg-head"><span class="chev">▼</span><span>${sgName}</span></div>` +
            `<div class="sg-body"></div>`;
          sg.querySelector(".sg-head").onclick = () => sg.classList.toggle("collapsed");
          wrap.appendChild(sg);
          superBodies[sgName] = sg.querySelector(".sg-body");
        }
        container = superBodies[sgName];
      }
      const mod = document.createElement("div");
      mod.className = "module collapsed";
      mod.innerHTML =
        `<div class="mod-head"><span class="chev">▼</span><span>${navLabel(g.name, sgName)}</span></div>` +
        `<ul class="lessons"></ul>`;
      const ul = mod.querySelector(".lessons");
      g.lessons.forEach(l => {
        order.push(l.id);
        const li = document.createElement("li");
        li.dataset.id = l.id;
        li.dataset.search = (l.title + " " + (l.module || "")).toLowerCase();
        const u = (window.USAGE && l.id in window.USAGE) ? window.USAGE[l.id] : null;
        // Green badge whose saturation grows with how commonly the concept is used (0–10).
        // Lightness is held constant so the white text stays equally readable across the scale.
        const badge = (u == null) ? "" :
          `<span class="usebadge" style="background:hsl(140 ${Math.round(14 + u * 6.6)}% 36%)" title="How commonly used in practice: ${u}/10 (10 = used everywhere, 0 = niche)">${u}</span>`;
        // Real anchor so lessons can be middle-/cmd-clicked into a new tab; in-tab clicks route via hashchange.
        li.innerHTML = `<a class="navlink" href="#${l.id}"><span class="ltitle">${l.title}</span>${badge}</a>`;
        ul.appendChild(li);
      });
      mod.querySelector(".mod-head").onclick = (e) => {
        if (e.target.closest(".modbar")) return;
        mod.classList.toggle("collapsed");
      };
      container.appendChild(mod);
    });
  }

  function updateBars() {
    const groups = group();
    document.querySelectorAll(".modbar").forEach(b => {
      const g = groups.find(x => x.name === b.dataset.mod);
      if (g) b.textContent = g.lessons.filter(l => progress[l.id]).length + "/" + g.lessons.length;
    });
    document.querySelectorAll(".lessons li").forEach(li => {
      li.classList.toggle("done", !!progress[li.dataset.id]);
    });
  }

  function symbolsTable(symbols) {
    if (!symbols || !symbols.length) return "";
    const rows = symbols.map(s => `<tr><td class="sym">${s.sym}</td><td>${s.desc}</td></tr>`).join("");
    return `<div class="card"><h3>Every symbol, in plain English</h3><table class="symbols">${rows}</table></div>`;
  }

  function prereqLinks(prereqs) {
    if (!prereqs || !prereqs.length) return "";
    const links = prereqs.map(id => byId[id]
      ? `<a onclick="App.open('${id}')">${byId[id].title}</a>` : null).filter(Boolean).join(", ");
    if (!links) return "";
    return `<div class="prereqs">🧩 <b>Best to read first:</b> ${links}</div>`;
  }

  // Link from a lesson into the concept map, centered on this node.
  function graphLink(id) {
    return `<div class="lesson-links"><a class="inlink" href="graph.html#${id}">See where this fits in the concept map →</a></div>`;
  }

  // Opens a starter notebook (committed under notebooks/) in Google Colab, with the
  // lesson's code + visualization + practice cells pre-populated. Colab loads it from
  // GitHub; the user does "Save a copy in Drive" to get their own runnable notebook.
  function colabBtn(id) {
    const url = "https://colab.research.google.com/github/niamleeson/ml-math/blob/main/notebooks/" + encodeURIComponent(id) + ".ipynb";
    return `<a class="colab-btn" href="${url}" target="_blank" rel="noopener">Open practice notebook in Colab</a>`;
  }

  // Real-world applications that use this concept (links into applications.html).
  function appUses(id) {
    const apps = APP_INDEX[id] || [];
    if (!apps.length) return "";
    const links = apps.map(a => `<a class="inlink" href="applications.html#app-${a.id}">${a.icon} ${a.name}</a>`).join(" · ");
    return `<p class="app-uses">🌍 <b>See it in action:</b> ${links}</p>`;
  }

  function quizBlock(quiz) {
    if (!quiz) return "";
    return `<div class="card quiz"><h3>Check yourself</h3><p>${quiz.q}</p>` +
      `<button class="reveal" onclick="this.parentElement.classList.toggle('open')">Show answer ▾</button>` +
      `<div class="answer">${quiz.a}</div></div>`;
  }

  function practiceBlock(list) {
    if (!list || !list.length) return "";
    const probs = list.map((p, i) => {
      const steps = (p.steps || []).map(s =>
        `<li><div class="do">${s.do || ""}</div>${s.why ? `<div class="why">${s.why}</div>` : ""}</li>`).join("");
      return `<div class="problem">
          <div class="qrow"><span class="qnum">${i + 1}</span><div class="qtext">${p.q}</div></div>
          <button class="reveal" onclick="this.closest('.problem').classList.toggle('open'); App.typeset(this.closest('.problem'));">Show step-by-step solution ▾</button>
          <div class="solution"><ol class="solsteps">${steps}</ol>${p.answer ? `<div class="finalans">✅ Answer: ${p.answer}</div>` : ""}</div>
        </div>`;
    }).join("");
    return `<div class="card practice"><h3>Practice — ${list.length} problems</h3>` +
      `<p class="hint">Try each one yourself first, then reveal the worked solution. Every step says <i>what</i> to do and <i>why</i>.</p>` +
      probs + `</div>`;
  }

  function section(cls, icon, label, html) {
    if (!html) return "";
    return `<div class="card ${cls}"><h3>${label}</h3>${html}</div>`;
  }

  // Real-world walkthroughs: a question the concept answers, solved end-to-end
  // (data -> manipulation -> code -> result -> conclusion). Replaces the old quiz.
  function walkthroughBlock(id) {
    const ws = window.WALKTHROUGHS && WALKTHROUGHS[id];
    if (!ws || !ws.length) return "";
    const items = ws.map((w, i) => {
      const steps = (w.steps || []).map(s => {
        const code = s.code
          ? `<div class="wt-code"><pre><code class="language-python">${escapeHtml(s.code)}</code></pre>` +
            (s.output ? `<div class="wt-out">${escapeHtml(s.output)}</div>` : "") + `</div>`
          : "";
        return `<li><div class="wt-st">${s.title ? `<b>${s.title}.</b> ` : ""}${s.body || ""}</div>${code}</li>`;
      }).join("");
      return `<div class="wt">` +
        `<button class="wt-head" onclick="App.toggleWT(this)">` +
          `<span class="wt-num">${i + 1}</span>` +
          `<span class="wt-q">${w.question || w.title || ""}</span>` +
          (w.domain ? `<span class="wt-dom">${w.domain}</span>` : "") +
          `<span class="wt-chev">▸</span></button>` +
        `<div class="wt-body"><ol class="wt-steps">${steps}</ol>` +
          (w.conclusion ? `<div class="wt-conc">✅ <b>Answer:</b> ${w.conclusion}</div>` : "") +
        `</div></div>`;
    }).join("");
    return `<div class="card walk"><h3>Real-world walkthroughs — ${ws.length}</h3>` +
      `<p class="hint">See the concept solve an actual problem, end to end: the question, the data, the work (with code &amp; math), and the answer. Click one to open.</p>` +
      items + `</div>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Bottom-of-lesson code section: idiomatic implementation in an industry library.
  function codeBlock(id) {
    const c = window.CODE && CODE[id];
    if (!c || !c.code) return "";
    const torch = /torch/i.test(c.lib);
    const runBtn = c.runnable
      ? `<button class="codebtn run" onclick="CodeRunner.run('${id}', this)">▶ Run</button>` : "";
    const note = c.runnable
      ? ""
      : `<div class="codenote">▶ Not runnable here — ${escapeHtml(c.lib)} needs a Python/GPU runtime. Copy it into a notebook (Colab works) to run.</div>`;
    return `<div class="card code"><h3>Implement it in code — ${escapeHtml(c.lib)}</h3>` +
      (c.explain ? c.explain : "") +
      `<div class="codewrap">` +
        `<div class="codebar"><span class="libtag${torch ? " torch" : ""}">${escapeHtml(c.lib)}</span><span class="sp"></span>` +
          `<button class="codebtn" onclick="CodeRunner.copy('${id}', this)">Copy</button>${runBtn}</div>` +
        `<pre><code class="language-python">${escapeHtml(c.code)}</code></pre>` +
        note +
        `<div class="codeout" id="codeout-${id}" style="display:none"></div>` +
      `</div></div>`;
  }

  // Visualize the code's data & results with charts/graphs (drawn after render).
  function codeVizBlock(id) {
    const v = window.CODEVIZ && CODEVIZ[id];
    if (!v || !v.charts || !v.charts.length) return "";
    const canvases = v.charts.map((ch, i) =>
      `<div class="vizchart">${ch.title ? `<div class="vizct">${ch.title}</div>` : ""}` +
      `<canvas data-viz="${id}::${i}" width="600" height="${ch.h || 260}"></canvas>` +
      `${ch.interpret ? `<div class="vizinterp">${ch.interpret}</div>` : ""}</div>`).join("");
    const hasCode = !!v.code;
    const toggle = hasCode
      ? `<div class="viztoggle"><button class="vbtn active" onclick="App.vizView(this,'chart')">📊 Chart</button>` +
        `<button class="vbtn" onclick="App.vizView(this,'code')">💻 Code that made it</button></div>`
      : "";
    return `<div class="card viz"><h3>Visualize the data &amp; results</h3>` +
      (v.question ? `<p class="vizq">❓ <b>${v.question}</b></p>` : "") +
      toggle +
      `<div class="viz-charts">${canvases}</div>` +
      (hasCode ? `<div class="viz-code" style="display:none"><pre><code class="language-python">${escapeHtml(v.code)}</code></pre></div>` : "") +
      (v.caption ? `<p class="vizcap">${v.caption}</p>` : "") +
      `</div>`;
  }
  function drawLessonViz(root) {
    if (!window.Charts) return;
    root.querySelectorAll("canvas[data-viz]").forEach(cv => {
      const parts = cv.dataset.viz.split("::"), v = window.CODEVIZ && CODEVIZ[parts[0]];
      if (v && v.charts && v.charts[+parts[1]]) Charts.draw(cv, v.charts[+parts[1]]);
    });
  }

  // ---- Paper-lesson + capstone rendering ----
  function trackBadge(track) {
    const m = { primitive: ["🔨 Build from scratch", "tb-a"], architecture: ["🧩 Compose with PyTorch", "tb-b"], "read-only": ["📖 Read-only", "tb-r"] };
    const t = m[track]; return t ? `<span class="trackbadge ${t[1]}">${t[0]}</span>` : "";
  }
  // Rule: whenever we link a paper, link to its in-app lesson too — UNLESS that lesson
  // is the page currently open. Returns "" when the target has no lesson or is the current page.
  function lessonRefLink(paperId, currentId) {
    if (!paperId || paperId === currentId || !byId[paperId]) return "";
    return `<a class="lessonlink" onclick="App.open('${paperId}')">lesson</a>`;
  }
  function paperCard(l) {
    const p = l.paper || {};
    const links = [];
    const paperUrl = p.arxiv || p.url || p.pdf;
    if (paperUrl) links.push(`<a href="${paperUrl}" target="_blank" rel="noopener">Read the paper</a>`);
    if (p.code) links.push(`<a href="${p.code}" target="_blank" rel="noopener">💻 Official code</a>`);
    const meta = [p.authors, p.org, p.venue, p.year, p.citations].filter(Boolean).join(" · ");
    return `<div class="papercard"><div class="pc-top">${trackBadge(l.track)}</div>` +
      (meta ? `<div class="pc-meta">${meta}</div>` : "") +
      (links.length ? `<div class="pc-links">${links.join(" · ")}</div>` : "") + `</div>`;
  }
  function partOfCallout(l) {
    if (!l.partOf || !l.partOf.length) return "";
    const items = l.partOf.map(po => {
      const cap = byId[po.capstone], name = cap ? cap.title : po.capstone;
      return `<a onclick="App.open('${po.capstone}')">${name}</a>` + (po.step ? ` — step ${po.step}` : "") + (po.builds ? ` (${po.builds})` : "");
    }).join("; ");
    return `<div class="partof"><b>Part of capstone:</b> ${items}</div>`;
  }
  function conceptCallout(l) {
    if (!l.conceptLink || !byId[l.conceptLink]) return "";
    return `<div class="conceptlink"><b>The underlying math is taught in:</b> <a onclick="App.open('${l.conceptLink}')">${byId[l.conceptLink].title}</a></div>`;
  }
  function recallBlock(list) {
    if (!list || !list.length) return "";
    return `<div class="card recall"><h3>Recall check — close the page, answer from memory</h3><ul>` +
      list.map(q => `<li>${q}</li>`).join("") + `</ul></div>`;
  }
  function navRow(id, prev, next) {
    return `<div class="nav-row">` +
      `<button ${prev ? `onclick="App.open('${prev}')"` : "disabled"}><span>← Previous</span>${prev ? byId[prev].title : ""}</button>` +
      `<button class="next" ${next ? `onclick="App.open('${next}')"` : "disabled"}><span>Next →</span>${next ? byId[next].title : ""}</button>` +
      `</div>`;
  }
  function renderPaper(l, id, prev, next) {
    const howItWorks =
      section("", "🔬", "How it works", l.walkthrough) +
      section("", "🏛️", "The architecture — component by component", l.architecture) +
      symbolsTable(l.symbols) +
      (l.formula ? `<div class="card"><h3>Key equations</h3><div class="formula-box">${l.formula}</div>${l.whatItDoes || ""}</div>` : "") +
      section("deriv", "📜", "Why it's true", l.derivation) +
      section("example", "🔢", "Worked example — real numbers", l.example) +
      section("", "🪜", "The recipe — what you'll build", l.recipe) +
      section("", "📊", "What the paper showed", l.results);
    return `<div class="crumbs">${l.module}</div>` +
      `<h2 class="lesson-title">${l.title}</h2>` +
      (l.tagline ? `<p class="lesson-sub">${l.tagline}</p>` : "") +
      paperCard(l) + partOfCallout(l) + prereqLinks(l.prereqs) + colabBtn(id) +
      section("", "🔧", "The problem it solved", l.problem) +
      section("", "✨", "What it introduced", l.contribution) +
      section("", "🌟", "Why it mattered", l.whyItMattered) +
      section("", "📖", "How to read the paper", l.readingGuide) +
      section("predict", "🤔", "Predict first — guess before you run", l.predict) +
      section("", "⌨️", "Your turn — try it before the reveal", l.attempt) +
      `<div class="uh-divider">How it works — read &amp; understand</div>` +
      howItWorks + conceptCallout(l) +
      section("", "🧱", "Implement it — build vs import", l.implementBoundary) +
      codeBlock(id) + codeVizBlock(id) +
      section("eval", "🧪", "Evaluate it — is your build actually working?", l.evaluation) +
      section("pitfalls", "⚠️", "Pitfalls &amp; gotchas", l.pitfalls) +
      recallBlock(l.recall) + practiceBlock(l.practice) + navRow(id, prev, next);
  }
  function renderCapstone(l, id, prev, next) {
    const steps = (l.steps || []).map(s => {
      const lp = byId[s.paper], name = lp ? lp.title : s.paper;
      const src = lp && lp.paper && (lp.paper.arxiv || lp.paper.url || lp.paper.pdf);
      // Whenever we link a paper, link its in-app lesson too — unless that lesson is
      // the page we're already on (here the page is the capstone, so it never is).
      const llink = lessonRefLink(s.paper, id) || (lp ? "" : `<i>lesson coming soon</i>`);
      const plink = src ? `<a class="paperlink" href="${src}" target="_blank" rel="noopener">paper</a>` : "";
      const refs = [llink, plink].filter(Boolean).join(" · ");
      return `<li><b>${name}</b>${s.builds ? ` — ${s.builds}` : ""}${refs ? ` — ${refs}` : ""}${s.milestone ? ` <span class="milestone">milestone</span>` : ""}</li>`;
    }).join("");
    return `<div class="crumbs">${l.module}</div>` +
      `<h2 class="lesson-title">${l.title}</h2>` +
      (l.tagline ? `<p class="lesson-sub">${l.tagline}</p>` : "") +
      section("", "🎯", "The goal", l.goal) +
      section("", "🧭", "What you'll build", l.architecture) +
      `<div class="card"><h3>Build order — implement each paper, then assemble</h3><ol class="capsteps">${steps}</ol></div>` +
      colabBtn(id) + codeBlock(id) + codeVizBlock(id) +
      section("", "💭", "Reflection", l.reflection) +
      practiceBlock(l.practice) + navRow(id, prev, next);
  }

  // ---- PyTorch course template (template: "pytorch") ----
  function apiTableBlock(list) {
    if (!list || !list.length) return "";
    const rows = list.map(a =>
      `<tr><td class="api-sig"><code>${escapeHtml(a.sig)}</code></td>` +
      `<td>${a.does || ""}${a.snippet ? `<pre class="api-eg"><code class="language-python">${escapeHtml(a.snippet)}</code></pre>` : ""}</td></tr>`).join("");
    return `<div class="card"><h3>The API, piece by piece</h3>` +
      `<p class="hint">The functions and methods this lesson uses. Skim now; you'll meet each one in the walkthrough below.</p>` +
      `<table class="api-table">${rows}</table></div>`;
  }
  function codeTourBlock(list) {
    if (!list || !list.length) return "";
    const steps = list.map(s =>
      `<div class="tour-step"><div class="tour-explain">${s.explain || ""}</div>` +
      (s.code ? `<pre><code class="language-python">${escapeHtml(s.code)}</code></pre>` : "") +
      (s.output ? `<div class="tour-out">${escapeHtml(s.output)}</div>` : "") + `</div>`).join("");
    return `<div class="card"><h3>Code walkthrough — read it line by line</h3>` +
      `<p class="hint">The canonical example in small chunks: read the note, then the code it describes, then the output. Type each chunk into Colab as you go.</p>` +
      steps + `</div>`;
  }
  function cheatsheetBlock(list) {
    if (!list || !list.length) return "";
    const rows = list.map(c =>
      `<div class="cheat-row"><code>${escapeHtml(c.code)}</code><span class="cheat-note">${c.note || ""}</span></div>`).join("");
    return `<div class="card"><h3>Cheat-sheet — the lines worth memorizing</h3>${rows}</div>`;
  }
  function renderPyTorch(l, id, prev, next) {
    return `<div class="crumbs">${l.module}</div>` +
      `<h2 class="lesson-title">${l.title}</h2>` +
      (l.tagline ? `<p class="lesson-sub">${l.tagline}</p>` : "") +
      prereqLinks(l.prereqs) + graphLink(id) + colabBtn(id) +
      section("objective", "🎯", "What you'll be able to do", l.objective) +
      section("idea", "🧠", "The concept", l.concept) +
      apiTableBlock(l.apiTable) +
      codeTourBlock(l.codeTour) +
      section("example", "🔎", "What you should see when you run it", l.expected) +
      section("example", "🔢", "Worked example — real numbers", l.example) +
      codeVizBlock(id) +
      section("pitfalls", "⚠️", "Gotchas &amp; fixes", l.pitfalls) +
      practiceBlock(l.practice) +
      cheatsheetBlock(l.cheatsheet) +
      (l.deeper ? `<div class="uh-divider">Go deeper — the math behind it</div>` +
        section("deriv", "📐", "Go deeper", l.deeper) : "") +
      navRow(id, prev, next);
  }

  // Book lessons: render the chapter faithfully as flowing prose + sub-headings, not the
  // fixed concept/paper scaffold. `sections:[{h?, body}]` carries the book's own structure.
  function renderBook(l, id, prev, next) {
    const body = (l.sections || []).map(s =>
      `${s.h ? `<h3 class="book-h">${s.h}</h3>` : ""}${s.body || ""}`).join("");
    const takeaways = (l.takeaways && l.takeaways.length)
      ? `<div class="book-takeaways"><h3>Key takeaways</h3><ul>` +
        l.takeaways.map(t => `<li>${t}</li>`).join("") + `</ul></div>`
      : "";
    return `<div class="crumbs">${l.book || l.module}${l.chapter ? " · " + l.chapter : ""}</div>` +
      `<h2 class="lesson-title">${l.title}</h2>` +
      (l.tagline ? `<p class="lesson-sub">${l.tagline}</p>` : "") +
      prereqLinks(l.prereqs) +
      `<div class="card book-chapter">${body}${takeaways}</div>` +
      codeVizBlock(id) +
      navRow(id, prev, next);
  }

  // ===== Math track: our own 5-section spec. Structure is enforced here, not by the author. =====
  function renderMath(l, id, prev, next) {
    const noteHTML = `<p class="scaffold-note">To be authored.</p>`;

    const c = l.connections || {};
    let ci = "";
    if (c.buildsOn && c.buildsOn.length) ci += `<li><b>Builds on</b> — ${c.buildsOn.join("; ")}.</li>`;
    if (c.leadsTo && c.leadsTo.length)   ci += `<li><b>Leads to</b> — ${c.leadsTo.join("; ")}.</li>`;
    if (c.usedWith && c.usedWith.length) ci += `<li><b>Used with</b> — ${c.usedWith.join("; ")}.</li>`;
    const conn = `<h3 class="book-h">Connections</h3>` + (ci ? `<ul class="mbul">${ci}</ul>` : noteHTML);

    const moti = `<h3 class="book-h">Motivation &amp; Intuition</h3>` + (l.motivation || noteHTML);
    const defn = `<h3 class="book-h">Definition &amp; Assumptions</h3>` + (l.definition || noteHTML);

    const w = l.worked || {};
    let meta = "";
    if (w.skills && w.skills.length) meta += `<span class="skills">${w.skills.join(" \u00B7 ")}</span>`;
    meta = meta ? `<p class="lesson-meta">${meta}</p>` : "";
    const steps = (w.steps || []).map(s => `<li><b>${s.do}</b>${s.result ? ` &rarr; ${s.result}` : ""}${s.why ? ` &mdash; ${s.why}` : ""}</li>`).join("");
    const practice = (l.practice && l.practice.length)
      ? `<p><b>Practice — ${l.practice.length} problems, each fully worked.</b> Try it, then reveal the step-by-step solution.</p>` +
        l.practice.map((pr, i) =>
          `<div class="practice-item"><p><b>${i + 1}.</b> ${pr.problem}</p>` +
          `<details class="hint"><summary>Step-by-step solution</summary>` +
          ((pr.steps && pr.steps.length) ? `<ol class="mnum">${pr.steps.map(s => `<li><b>${s.do}</b>${s.result ? ` &rarr; ${s.result}` : ""}${s.why ? ` &mdash; ${s.why}` : ""}</li>`).join("")}</ol>` : (pr.solution ? `<p>${pr.solution}</p>` : "")) +
          (pr.answer ? `<p><b>Answer:</b> ${pr.answer}</p>` : "") +
          `</details></div>`
        ).join("")
      : "";
    const workedBody = (w.problem || (w.steps && w.steps.length))
      ? meta +
        (w.problem ? `<p>${w.problem}</p>` : "") +
        (w.strategy ? `<p class="strategy"><b>Strategy.</b> ${w.strategy}</p>` : "") +
        (steps ? `<p>Now, one operation at a time:</p><ol class="mnum">${steps}</ol>` : "") +
        (w.verify ? `<p><b>Verify.</b> ${w.verify}</p>` : "") +
        (w.answer ? `<p><b>Answer:</b> ${w.answer}</p>` : "") +
        (w.connects ? `<p class="connects"><b>Connects to:</b> ${w.connects}</p>` : "") +
        practice
      : noteHTML;
    const worked = `<h3 class="book-h">Worked Example &amp; Practice</h3>` + workedBody;

    const apps = (l.applications && l.applications.length)
      ? l.applications.map((a, i) => `<p><b>${i + 1}. ${a.title}.</b> ${a.background || ""}${a.numbers ? " " + a.numbers : ""}</p>`).join("") +
        (l.applicationsClose ? `<p>${l.applicationsClose}</p>` : "")
      : noteHTML;
    const appsSec = `<h3 class="book-h">Real-World Applications in CS &amp; ML</h3>` + apps;

    const takeaways = (l.takeaways && l.takeaways.length)
      ? `<div class="book-takeaways"><h3>Key takeaways</h3><ul>${l.takeaways.map(t => `<li>${t}</li>`).join("")}</ul></div>` : "";

    return `<div class="mathdoc">` +
      `<div class="crumbs">${l.book || l.module}</div>` +
      `<h2 class="lesson-title">${l.title}</h2>` +
      (l.tagline ? `<p class="lesson-sub">${l.tagline}</p>` : "") +
      prereqLinks(l.prereqs) +
      `<div class="card book-chapter">${conn}${moti}${defn}${worked}${appsSec}${takeaways}</div>` +
      navRow(id, prev, next) +
      `</div>`;
  }

  function open(id) {
    const l = byId[id];
    if (!l) return;
    const idx = order.indexOf(id);
    const prev = order[idx - 1], next = order[idx + 1];

    // The math/theory, folded under a collapsible so the page leads with implementation.
    const formulaBlock = l.formula
      ? `<div class="card"><h3>The formula</h3><div class="formula-box">${l.formula}</div>${l.whatItDoes ? l.whatItDoes : ""}</div>`
      : (l.whatItDoes ? section("", "➗", "What it does", l.whatItDoes) : "");
    const underHood =
      section("idea", "💡", "The big idea", l.bigIdea) +
      section("", "🪜", "Building up to it", l.buildup) +
      symbolsTable(l.symbols) +
      formulaBlock +
      section("deriv", "📜", "Why it's true — derivation &amp; intuition", l.derivation) +
      section("example", "🔢", "Concrete example (real numbers)", l.example);
    const underHoodWrap = underHood.trim()
      ? `<div class="uh-divider">Under the hood — the math &amp; intuition</div>${underHood}`
      : "";

    let html;
    if (l.type === "capstone") { html = renderCapstone(l, id, prev, next); }
    else if (l.paper) { html = renderPaper(l, id, prev, next); }
    else if (l.template === "pytorch") { html = renderPyTorch(l, id, prev, next); }
    else if (l.template === "book") { html = renderBook(l, id, prev, next); }
    else if (l.template === "math") { html = renderMath(l, id, prev, next); }
    else if (l.template === "allml") { html = window.renderAllMLLesson(l, prev, next, byId); }
    else { html =
      `<div class="crumbs">${l.module}</div>` +
      `<h2 class="lesson-title">${l.title}</h2>` +
      (l.tagline ? `<p class="lesson-sub">${l.tagline}</p>` : "") +
      prereqLinks(l.prereqs) +
      graphLink(id) +
      colabBtn(id) +
      // ---- Implementation-first: lead with when/where/how, then run it, then pitfalls ----
      section("whenuse", "🎯", "When to reach for it", l.whenToUse) +
      section("playbook", "🧭", "The playbook", l.playbook) +
      section("app", "🚀", "Where it's used in practice", (l.application || "") + appUses(id)) +
      codeBlock(id) +
      codeVizBlock(id) +
      walkthroughBlock(id) +
      section("pitfalls", "⚠️", "Production pitfalls", l.pitfalls) +
      section("checklist", "✅", "Your checklist", l.checklist) +
      // ---- Theory, folded ----
      underHoodWrap +
      (l.demo ? `<div class="card"><h3>Play with it</h3><div class="demo" id="demo-host"></div></div>` : "") +
      practiceBlock(l.practice) +
      `<div class="nav-row">` +
        `<button ${prev ? `onclick="App.open('${prev}')"` : "disabled"}><span>← Previous</span>${prev ? byId[prev].title : ""}</button>` +
        `<button class="next" ${next ? `onclick="App.open('${next}')"` : "disabled"}><span>Next →</span>${next ? byId[next].title : ""}</button>` +
      `</div>`; }

    const c = document.getElementById("content");
    c.innerHTML = html;
    document.querySelectorAll(".lessons li").forEach(li => li.classList.toggle("active", li.dataset.id === id));
    // Expand the section that holds the active lesson and scroll it into view in the sidebar,
    // so opening a lesson (via search, prev/next, a cross-link, or a #hash) always reveals where it lives.
    const activeLi = document.querySelector(`.lessons li[data-id="${id}"]`);
    if (activeLi) {
      const mod = activeLi.closest(".module");
      if (mod) mod.classList.remove("collapsed");
      const sg = activeLi.closest(".supergroup");
      if (sg) sg.classList.remove("collapsed");
      activeLi.scrollIntoView({ block: "nearest" });
    }
    if (l.demo) { try { l.demo(document.getElementById("demo-host")); } catch (e) { console.warn(e); } }
    if (window.hljs) c.querySelectorAll("pre code").forEach(b => { try { hljs.highlightElement(b); } catch (e) {} });
    drawLessonViz(c);
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([c]);
    document.getElementById("main").scrollTo(0, 0);
    if (history.replaceState) history.replaceState(null, "", "#" + id);
  }

  function toggleDone(id) {
    progress[id] = !progress[id];
    if (!progress[id]) delete progress[id];
    save(); updateBars(); open(id);
  }

  function filter(q) {
    q = (q || "").trim().toLowerCase();
    document.querySelectorAll(".module").forEach(mod => {
      let any = false;
      mod.querySelectorAll(".lessons li").forEach(li => {
        const match = !q || li.dataset.search.includes(q);
        li.style.display = match ? "" : "none";
        if (match) any = true;
      });
      mod.style.display = any ? "" : "none";
      if (q && any) mod.classList.remove("collapsed");
    });
    document.querySelectorAll(".supergroup").forEach(sg => {
      const anyMod = [...sg.querySelectorAll(".module")].some(m => m.style.display !== "none");
      sg.style.display = anyMod ? "" : "none";
      if (q && anyMod) sg.classList.remove("collapsed");
    });
  }

  function welcome() {
    const total = LESSONS.length;
    document.getElementById("content").innerHTML = `
      <div id="welcome">
        <div class="crumbs">Start here</div>
        <h2>Learn the maths behind ML, Deep Learning & AI 🧠</h2>
        <p class="lesson-sub">Every formula from the Stanford / MIT cheat sheets — rebuilt as
        plain-English lessons. Short sentences. Every symbol explained. A worked example with real
        numbers, and where each idea is used in the real world.</p>
        <p>You have <b class="hl">${total}</b> lessons.
        Pick a topic on the left, or start at the very beginning 👇</p>
        <div class="grid">
          ${group().map(g => `<div class="card"><h3>${g.name}</h3>
             <p class="hint">${g.lessons.length} lessons.</p>
             <a class="inlink" onclick="App.open('${g.lessons[0].id}')">Start →</a></div>`).join("")}
        </div>
        <p style="margin-top:24px" class="hint">Tip: your progress is saved in this browser automatically.
        Formulas are rendered by MathJax (needs internet the first load).</p>
      </div>`;
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
  }

  function boot() {
    if (!LESSONS.length) {
      document.getElementById("content").innerHTML =
        "<p style='color:#ffb454'>No lessons loaded. Make sure the <code>lessons/*.js</code> files are next to this page.</p>";
      return;
    }
    // Merge derivation text + practice problems into lessons by id.
    LESSONS.forEach(l => {
      if (!l.derivation && window.DERIVATIONS && DERIVATIONS[l.id]) l.derivation = DERIVATIONS[l.id];
      if (!l.practice && window.PRACTICE && PRACTICE[l.id]) l.practice = PRACTICE[l.id];
    });
    buildAppIndex();
    renderSidebar();
    // Phones start with the sidebar collapsed (it overlays content); desktop starts expanded.
    if (window.innerWidth <= 820) document.body.classList.add("nav-collapsed");
    const hash = location.hash.replace("#", "");
    if (hash && byId[hash]) {
      open(hash);   // open() expands only the section that holds this lesson
    } else {
      welcome();
      const first = document.querySelector("#modules .module");
      if (first) {
        first.classList.remove("collapsed");                       // default landing: first section open
        const fsg = first.closest(".supergroup");
        if (fsg) fsg.classList.remove("collapsed");                // …and expand its umbrella so it's visible
      }
    }
    // In-tab nav-anchor clicks (and browser back/forward) change the hash; route them here.
    window.addEventListener("hashchange", () => {
      const h = location.hash.replace("#", "");
      if (h && byId[h]) {
        open(h);
        if (window.innerWidth <= 820) document.body.classList.add("nav-collapsed");
      }
    });
  }

  function typeset(el) { if (el && window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]); }
  function toggleWT(btn) { const wt = btn.parentElement; wt.classList.toggle("open"); }
  function vizView(btn, mode) {
    const card = btn.closest(".card.viz");
    card.querySelectorAll(".vbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const charts = card.querySelector(".viz-charts"), code = card.querySelector(".viz-code");
    if (charts) charts.style.display = mode === "chart" ? "" : "none";
    if (code) code.style.display = mode === "code" ? "" : "none";
  }

  return { boot, open, toggleDone, filter, typeset, toggleWT, vizView };
})();
window.App = App;   // expose for deep-linking and the screenshot/QA harness
window.addEventListener("DOMContentLoaded", App.boot);
</script>

<!-- Runs the per-lesson runnable code examples in the browser via Pyodide. -->
<script>
const CodeRunner = (function () {
  let pyReady = null;
  function ensurePy() {
    if (!pyReady) {
      pyReady = (async () => {
        if (!window.loadPyodide) throw new Error("Python runtime didn't load (need internet the first time).");
        return await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/" });
      })();
    }
    return pyReady;
  }
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  async function run(id, btn) {
    const c = window.CODE && CODE[id]; if (!c) return;
    const out = document.getElementById("codeout-" + id);
    out.style.display = "block";
    out.textContent = "Loading the Python runtime… (first run downloads ~6 MB, then it's cached).";
    btn.disabled = true; const label = btn.textContent; btn.textContent = "Running…";
    try {
      const py = await ensurePy();
      if (c.packages && c.packages.length) { out.textContent = "Loading packages: " + c.packages.join(", ") + " …"; await py.loadPackage(c.packages); }
      let buf = "";
      // Pyodide's batched stdout fires once per line without the trailing newline — re-add it.
      py.setStdout({ batched: s => { buf += s + "\n"; } });
      py.setStderr({ batched: s => { buf += s + "\n"; } });
      out.textContent = "";
      await py.runPythonAsync(c.code);
      let img = "";
      try {
        if (py.FS.analyzePath("/tmp/out.png").exists) {
          const data = py.FS.readFile("/tmp/out.png"); let bin = "";
          for (let i = 0; i < data.length; i++) bin += String.fromCharCode(data[i]);
          img = '<img src="data:image/png;base64,' + btoa(bin) + '">'; py.FS.unlink("/tmp/out.png");
        }
      } catch (e) {}
      out.innerHTML = '<span class="ok">✓ ran successfully</span>\n' + esc(buf) + img;
    } catch (e) {
      out.innerHTML = '<span class="err">✗ ' + esc(e.message || e) + '</span>';
    } finally {
      btn.disabled = false; btn.textContent = label;
    }
  }
  function copy(id, btn) {
    const c = window.CODE && CODE[id]; if (!c) return;
    navigator.clipboard.writeText(c.code).then(() => {
      const o = btn.textContent; btn.textContent = "Copied!"; setTimeout(() => { btn.textContent = o; }, 1200);
    }).catch(() => {});
  }
  return { run, copy };
})();
window.CodeRunner = CodeRunner;
</script>
