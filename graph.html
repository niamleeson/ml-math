<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concept Map — ML Math Tutor</title>

<!-- Apply saved theme BEFORE first paint (shared with the main app via the same key). -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("mlmath_theme");
      if (t !== "light" && t !== "dark") {
        t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
  })();
</script>

<style>
  :root {
    --bg: #0f1419; --panel: #161c24; --panel-2: #1d2530;
    --ink: #e6edf3; --ink-dim: #9aa7b4; --accent: #4ea1ff; --border: #2a3340;
    --edge: #3a4654; --edge-strong: #5b6b7e; --elabel-bg: #11161d;
  }
  :root[data-theme="light"] {
    --bg: #f6f8fa; --panel: #ffffff; --panel-2: #eaeef2;
    --ink: #1f2328; --ink-dim: #59636e; --accent: #0969da; --border: #d0d7de;
    --edge: #c3ccd6; --edge-strong: #8b97a4; --elabel-bg: #ffffff;
  }
  html { color-scheme: dark; } html[data-theme="light"] { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: var(--bg); color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; overflow: hidden; }

  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); z-index: 5;
  }
  header h1 { font-size: 16px; margin: 0; }
  header .sub { color: var(--ink-dim); font-size: 12px; }
  header .spacer { flex: 1; }
  header a, header button, #search {
    background: var(--bg); border: 1px solid var(--border); color: var(--ink);
    border-radius: 8px; padding: 7px 11px; font-size: 13px; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  header a:hover, header button:hover { border-color: var(--accent); }
  #search { cursor: text; min-width: 190px; }
  #search::placeholder { color: var(--ink-dim); }

  #cy { flex: 1; width: 100%; }

  #legend {
    position: absolute; left: 12px; bottom: 12px; z-index: 6;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 11px; max-width: 280px; box-shadow: 0 6px 20px rgba(0,0,0,.25);
    font-size: 11.5px; max-height: 46vh; overflow:auto;
  }
  #legend b { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-dim); }
  #legend .row { display: flex; align-items: center; gap: 7px; margin-top: 5px; }
  #legend .sw { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,.2); }
  #legend .hint { color: var(--ink-dim); margin-top: 8px; line-height: 1.4; }
  #hud {
    position: absolute; right: 12px; bottom: 12px; z-index: 6;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px; display: flex; gap: 6px; box-shadow: 0 6px 20px rgba(0,0,0,.25);
  }
  #hud button { width: 34px; height: 34px; font-size: 16px; padding: 0; justify-content: center; }
  .err { padding: 40px; max-width: 600px; margin: 0 auto; }
  header a.back { font-weight: 600; }
  /* Hover / pinned "go to lesson" popover that floats above a node. */
  #nodePop {
    position: fixed; z-index: 20; transform: translate(-50%, -100%);
    display: none; align-items: center; gap: 9px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 9px;
    padding: 6px 8px 6px 11px; box-shadow: 0 8px 22px rgba(0,0,0,.32);
    font-size: 13px; max-width: 260px;
  }
  #nodePop::after {  /* little pointer tail */
    content: ""; position: absolute; left: 50%; bottom: -6px; transform: translateX(-50%);
    border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid var(--border);
  }
  #nodePop .pt { font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #nodePop .go {
    flex: 0 0 auto; width: 26px; height: 26px; border-radius: 7px; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent); color: #04121f; font-weight: 800; font-size: 15px;
  }
  #nodePop .go:hover { filter: brightness(1.12); }
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">← Lessons</a>
  <h1>🗺️ Concept Map</h1>
  <span class="sub">How every idea connects — zoom in to read each link.</span>
  <span class="spacer"></span>
  <input id="search" placeholder="Find a concept…" oninput="GraphApp.search(this.value)" />
  <button onclick="GraphApp.fit()" title="Fit everything in view">⤢ Fit</button>
  <a href="playbook.html" title="Decision trees for building a model">🧩 Playbook</a>
  <a href="sim.html" title="Build a model end-to-end in a mock ML lab">🛠️ ML Lab</a>
  <a href="applications.html" title="Browse by real-world application">🚀 Applications</a>
  <button id="themeToggle" onclick="GraphApp.toggleTheme()" title="Toggle light / dark">☀️</button>
</header>

<div id="cy"></div>
<div id="nodePop"><span class="pt"></span><a class="go" title="Open this lesson">↗</a></div>
<div id="legend"></div>
<div id="hud">
  <button onclick="GraphApp.zoom(1.3)" title="Zoom in">＋</button>
  <button onclick="GraphApp.zoom(1/1.3)" title="Zoom out">－</button>
</div>

<!-- Graph library + hierarchical (non-random) layout. -->
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>

<!-- Lesson registry (titles, modules, prereqs) + edge labels. Reuses the same content files. -->
<script>window.LESSONS=[];window.DERIVATIONS={};window.PRACTICE={};window.Demos=new Proxy({},{get:()=>function(){}});</script>
<script src="lessons/00-foundations.js"></script>
<script src="lessons/01-probability.js"></script>
<script src="lessons/02-ml.js"></script>
<script src="lessons/03-deeplearning.js"></script>
<script src="lessons/04-ai.js"></script>
<script src="lessons/05-linalg.js"></script>
<script src="lessons/06-prob-extra.js"></script>
<script src="lessons/07-ml-extra.js"></script>
<script src="lessons/08-ai-extra.js"></script>
<script src="lessons/09-classical-a.js"></script>
<script src="lessons/09-classical-b.js"></script>
<script src="lessons/10-modern-a.js"></script>
<script src="lessons/10-modern-b.js"></script>
<script src="lessons/graph-labels.js"></script>
<script src="lessons/usage.js"></script>

<script>
const GraphApp = (function () {
  // Module -> base hue (a harmonious, well-separated palette).
  const MOD_HUE = {
    "Foundations: Math you need first": 215,
    "Linear Algebra (deep dive)": 175,
    "Probability & Statistics": 142,
    "Probability (advanced)": 100,
    "Machine Learning (CS229)": 262,
    "Machine Learning — more": 288,
    "Classical ML (beyond the cheat sheet)": 322,
    "Deep Learning (CS230)": 28,
    "Modern Deep Learning & AI": 8,
    "Artificial Intelligence (CS221)": 192,
    "Artificial Intelligence — more": 234
  };
  const MOD_ORDER = Object.keys(MOD_HUE);
  let cy = null, pinned = null, hovered = null;

  function theme() { return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark"; }
  function cssVar(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

  // Node colors per module per theme. Lightness held in a readable band; hue identifies the module.
  // NOTE: comma-separated hsl() — cytoscape's color parser does not accept the space-separated form.
  function nodeFill(hue) { return theme() === "light" ? `hsl(${hue}, 78%, 85%)` : `hsl(${hue}, 50%, 31%)`; }
  function nodeBorder(hue) { return theme() === "light" ? `hsl(${hue}, 60%, 44%)` : `hsl(${hue}, 65%, 60%)`; }
  function nodeText(hue) { return theme() === "light" ? `hsl(${hue}, 70%, 22%)` : `hsl(${hue}, 75%, 93%)`; }

  function buildElements() {
    const byId = {}; (window.LESSONS || []).forEach(l => byId[l.id] = l);
    const nodes = [], edges = [];
    (window.LESSONS || []).forEach(l => {
      const hue = MOD_HUE[l.module] != null ? MOD_HUE[l.module] : 220;
      const u = (window.USAGE && l.id in window.USAGE) ? window.USAGE[l.id] : 5;
      nodes.push({ data: {
        id: l.id, label: l.title, mod: l.module, hue: hue, usage: u,
        bg: nodeFill(hue), bd: nodeBorder(hue), tx: nodeText(hue)
      }});
    });
    const L = window.GRAPH_LABELS || {};
    (window.LESSONS || []).forEach(l => {
      const ps = (l.prereqs || []).filter(p => byId[p]);
      ps.forEach((p, i) => {
        edges.push({ data: {
          id: "e_" + p + "__" + l.id, source: p, target: l.id,
          label: L[p + ">>>" + l.id] || "", primary: i === 0 ? 1 : 0
        }, classes: i === 0 ? "primary" : "secondary" });
      });
    });
    return nodes.concat(edges);
  }

  function stylesheet() {
    const edge = cssVar("--edge"), edgeStrong = cssVar("--edge-strong"),
          inkDim = cssVar("--ink-dim"), elabelBg = cssVar("--elabel-bg"), accent = cssVar("--accent");
    return [
      { selector: "node", style: {
        "background-color": "data(bg)", "border-color": "data(bd)", "border-width": 1.5,
        "label": "data(label)", "color": "data(tx)",
        "font-size": 11, "font-weight": 600,
        "text-wrap": "wrap", "text-max-width": 130,
        "text-valign": "center", "text-halign": "center",
        "width": "label", "height": "label", "shape": "round-rectangle",
        "padding": "7px", "transition-property": "opacity", "transition-duration": "0.15s"
      }},
      // Bigger, bolder for the most commonly-used concepts.
      { selector: "node[usage >= 9]", style: { "font-size": 13, "border-width": 2.5 } },
      { selector: "node[usage <= 3]", style: { "font-size": 10 } },
      { selector: "edge", style: {
        "width": 1.2, "line-color": edge, "target-arrow-color": edge,
        "target-arrow-shape": "triangle", "arrow-scale": 0.8,
        "curve-style": "bezier", "opacity": 0.85,
        "label": "data(label)", "font-size": 8.5, "color": inkDim,
        "text-background-color": elabelBg, "text-background-opacity": 0.92,
        "text-background-padding": 2, "text-background-shape": "round-rectangle",
        "min-zoomed-font-size": 7,   // hide tiny labels when zoomed out -> clean overview
        "text-rotation": "autorotate"
      }},
      { selector: "edge.primary", style: { "width": 1.8, "line-color": edgeStrong, "target-arrow-color": edgeStrong, "opacity": 1 } },
      { selector: "edge.secondary", style: { "line-style": "dashed", "opacity": 0.5, "label": "" } },
      // Highlight state
      { selector: ".faded", style: { "opacity": 0.12, "text-opacity": 0.12 } },
      { selector: "node.hot", style: { "border-color": accent, "border-width": 3.5 } },
      { selector: "edge.hot", style: { "line-color": accent, "target-arrow-color": accent, "width": 2.6, "opacity": 1, "color": cssVar("--ink"), "z-index": 99 } },
      { selector: "node.search-hit", style: { "border-color": accent, "border-width": 4 } }
    ];
  }

  function restyleNodesForTheme() {
    cy.batch(() => {
      cy.nodes().forEach(n => {
        const hue = n.data("hue");
        n.data("bg", nodeFill(hue)); n.data("bd", nodeBorder(hue)); n.data("tx", nodeText(hue));
      });
    });
    cy.style(stylesheet());
  }

  function neighborhood(node) {
    const hood = node.closedNeighborhood();
    cy.elements().addClass("faded");
    hood.removeClass("faded");
    node.addClass("hot");
    node.connectedEdges().addClass("hot").removeClass("faded");
    node.connectedEdges().connectedNodes().removeClass("faded");
  }
  function clearHighlight() { cy.elements().removeClass("faded hot"); }

  function renderLegend() {
    const counts = {}; (window.LESSONS || []).forEach(l => counts[l.module] = (counts[l.module] || 0) + 1);
    const rows = MOD_ORDER.filter(m => counts[m]).map(m =>
      `<div class="row"><span class="sw" style="background:${nodeFill(MOD_HUE[m])};border-color:${nodeBorder(MOD_HUE[m])}"></span>${m} <span style="color:var(--ink-dim)">(${counts[m]})</span></div>`
    ).join("");
    document.getElementById("legend").innerHTML =
      `<b>Modules</b>${rows}<div class="hint">Arrows point from a concept to what it unlocks. <b>Hover</b> a node to trace its links and get a ↗ to its lesson · <b>click</b> to pin/unpin that highlight · scroll to zoom, drag to pan.</div>`;
  }

  function init() {
    if (!window.cytoscape) {
      document.getElementById("cy").innerHTML =
        `<div class="err"><h2>Couldn't load the graph library</h2><p>The concept map needs the Cytoscape library from a CDN (internet required the first time). Check your connection and reload. You can still use every <a href="index.html">lesson</a>.</p></div>`;
      return;
    }
    cytoscape.use(window.cytoscapeDagre);
    cy = cytoscape({
      container: document.getElementById("cy"),
      elements: buildElements(),
      style: stylesheet(),
      wheelSensitivity: 0.25,
      minZoom: 0.08, maxZoom: 2.5,
      layout: {
        name: "dagre", rankDir: "LR", nodeSep: 26, edgeSep: 12, rankSep: 150,
        ranker: "network-simplex", animate: false
      }
    });

    window.cy = cy;   // exposed for power-users / validation

    // Interaction: HOVER previews a node's links + shows a "go to lesson" popover.
    // CLICK toggles a pinned highlight (stays until you click it again or the background).
    // Navigation happens only via the ↗ icon in the popover — not by clicking the node.
    const pop = document.getElementById("nodePop");
    let hideTimer = null;
    function placePop(node) {
      const box = document.getElementById("cy").getBoundingClientRect();
      const bb = node.renderedBoundingBox();
      pop.style.left = (box.left + (bb.x1 + bb.x2) / 2) + "px";
      pop.style.top = (box.top + bb.y1 - 6) + "px";
    }
    function openPop(node) {
      pop.querySelector(".pt").textContent = node.data("label");
      pop.querySelector(".go").setAttribute("href", "index.html#" + node.id());
      placePop(node); pop.style.display = "flex";
    }
    function closePop() { pop.style.display = "none"; }
    pop.addEventListener("mouseenter", () => { if (hideTimer) clearTimeout(hideTimer); });
    pop.addEventListener("mouseleave", () => { if (!pinned) { closePop(); clearHighlight(); } });

    cy.on("mouseover", "node", evt => {
      document.body.style.cursor = "pointer";
      if (pinned) return;                 // a node is pinned -> ignore hover previews
      hovered = evt.target;
      if (hideTimer) clearTimeout(hideTimer);
      neighborhood(evt.target); openPop(evt.target);
    });
    cy.on("mouseout", "node", () => {
      document.body.style.cursor = "default";
      if (pinned) return;
      hovered = null;
      hideTimer = setTimeout(() => { if (!pinned) { closePop(); clearHighlight(); } }, 180);
    });
    cy.on("tap", "node", evt => {
      const n = evt.target;
      if (pinned && pinned.id() === n.id()) { pinned = null; clearHighlight(); closePop(); }
      else { pinned = n; hovered = null; neighborhood(n); openPop(n); }
    });
    cy.on("tap", evt => { if (evt.target === cy) { pinned = null; clearHighlight(); closePop(); } });
    cy.on("pan zoom", () => { const n = pinned || hovered; if (n && pop.style.display !== "none") placePop(n); });

    renderLegend();
    syncThemeButton();

    // Deep-link: graph.html#<lessonId> centers and highlights that node.
    const hash = location.hash.replace("#", "");
    if (hash && cy.getElementById(hash).length) {
      const n = cy.getElementById(hash);
      cy.zoom(1.1); cy.center(n); neighborhood(n);
    } else {
      cy.fit(undefined, 40);
    }
  }

  function syncThemeButton() {
    const b = document.getElementById("themeToggle");
    b.textContent = theme() === "light" ? "🌙" : "☀️";
    b.title = theme() === "light" ? "Switch to dark theme" : "Switch to light theme";
  }
  function toggleTheme() {
    const next = theme() === "light" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("mlmath_theme", next); } catch (e) {}
    if (cy) restyleNodesForTheme();
    renderLegend(); syncThemeButton();
  }
  function fit() { if (cy) cy.fit(undefined, 40); }
  function zoom(f) { if (cy) cy.zoom({ level: cy.zoom() * f, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } }); }
  function search(q) {
    if (!cy) return; q = (q || "").trim().toLowerCase();
    cy.nodes().removeClass("search-hit");
    if (!q) { clearHighlight(); return; }
    const hits = cy.nodes().filter(n => n.data("label").toLowerCase().includes(q));
    cy.elements().addClass("faded");
    hits.removeClass("faded").addClass("search-hit");
    hits.connectedEdges().removeClass("faded").connectedNodes().removeClass("faded");
    if (hits.length) { cy.animate({ fit: { eles: hits, padding: 80 } }, { duration: 350 }); }
  }

  window.addEventListener("DOMContentLoaded", init);
  return { fit, zoom, search, toggleTheme };
})();
</script>
</body>
</html>
