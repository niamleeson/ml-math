        - heading "🎯 When to reach for it" [level=3] [ref=e232]
        - paragraph [ref=e233]: Always. The tensor is the substrate of everything in PyTorch.
        - list [ref=e234]:
          - listitem [ref=e235]: "Every piece of data you feed a model is a tensor: a batch of images, a sequence of token ids, a table of features."
          - listitem [ref=e236]: Every weight and bias inside a model is a tensor.
          - listitem [ref=e237]: Every intermediate result, loss value, and gradient is a tensor.
        - paragraph [ref=e238]: "If you know numpy, you already know most of this. A PyTorch tensor adds two things numpy lacks: it can live on a GPU (Graphics Processing Unit) for fast math, and it can track operations so PyTorch can compute gradients automatically (autograd)."
      - generic [ref=e239]:
        - heading "🚀 Where it's used in practice" [level=3] [ref=e240]
        - paragraph [ref=e241]:
          - text: "In any real model: the input batch (shape"
          - code [ref=e242]: "[batch, channels, height, width]"
          - text: for images), the model parameters, and the loss are all tensors. You spend most of your PyTorch time shaping, moving, and indexing tensors. Get comfortable here and the rest of the course is mostly choosing which operations to apply.
