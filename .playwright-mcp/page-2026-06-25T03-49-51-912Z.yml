      - generic [ref=e306]:
        - heading "🪜 Building up to it" [level=3] [ref=e307]
        - paragraph [ref=e308]: "Think of it as numpy arrays you already met in fnd-vector and fnd-matrix, extended:"
        - list [ref=e309]:
          - listitem [ref=e310]: A 0-D tensor is a scalar (one number). A 1-D tensor is a vector. A 2-D tensor is a matrix. A 4-D tensor is a batch of color images.
          - listitem [ref=e311]:
            - code [ref=e312]: .ndim
            - text: tells you how many dimensions;
            - code [ref=e313]: .shape
            - text: gives the size along each;
            - code [ref=e314]: .numel()
            - text: is the total number of elements.
          - listitem [ref=e315]:
            - text: The data is stored contiguously — one long row in memory. The shape just tells PyTorch how to walk that row. This is why
            - code [ref=e316]: reshape
            - text: "is usually free: the numbers do not move, only the bookkeeping changes."
