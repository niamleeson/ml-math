<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>All ML — Curriculum</title>

<!-- MathJax: renders $...$ and $$...$$. Needs internet the first load, then cached. -->
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
    svg: { fontCache: 'global' }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
  :root {
    --bg:#0f1419; --panel:#161c24; --panel-2:#1d2530; --ink:#e6edf3; --ink-dim:#9aa7b4;
    --accent:#4ea1ff; --accent-2:#7ee787; --warn:#ffb454; --border:#2a3340; --good:#2ea043;
    --purple:#c89bff; --shadow:0 6px 24px rgba(0,0,0,.35); --maxw:860px;
  }
  :root[data-theme="light"] {
    --bg:#f6f8fa; --panel:#fff; --panel-2:#eaeef2; --ink:#1f2328; --ink-dim:#59636e;
    --accent:#0969da; --accent-2:#1a7f37; --warn:#9a6700; --border:#d0d7de; --good:#1a7f37;
    --purple:#8250df; --shadow:0 6px 20px rgba(140,149,159,.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--ink); display: flex;
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  a { color: var(--accent); text-decoration: none; }

  /* ---- Sidebar ---- */
  #sidebar {
    width: 320px; min-width: 320px; height: 100vh; overflow-y: auto;
    background: var(--panel); border-right: 1px solid var(--border); padding: 14px;
  }
  .side-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #themeToggle {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--ink);
    border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 15px;
  }
  #search {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border); color: var(--ink);
    border-radius: 8px; padding: 8px 10px; font-size: 14px;
  }
  .umbrella {
    margin: 6px 2px 12px; padding: 12px 12px; border-radius: 10px;
    background: linear-gradient(135deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
  }
  .umbrella h1 { margin: 0; font-size: 19px; letter-spacing: .2px; }
  .umbrella .sub { color: var(--ink-dim); font-size: 12px; margin-top: 3px; }

  .part { margin-bottom: 4px; }
  .part-head {
    display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
    padding: 8px 8px; border-radius: 8px; font-weight: 600; font-size: 14px;
  }
  .part-head:hover { background: var(--panel-2); }
  .part-head .chev { transition: transform .15s; color: var(--ink-dim); font-size: 11px; }
  .part.collapsed .chev { transform: rotate(-90deg); }
  .part.collapsed .lessons { display: none; }
  .part-head .pcount { margin-left: auto; color: var(--ink-dim); font-size: 12px; font-weight: 500; }
  .lessons { list-style: none; margin: 2px 0 6px; padding: 0 0 0 4px; }
  .lessons li a {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px 6px 22px;
    border-radius: 7px; color: var(--ink); font-size: 13.5px; border-left: 2px solid transparent;
  }
  .lessons li a:hover { background: var(--panel-2); }
  .lessons li a.active { background: var(--panel-2); border-left-color: var(--accent); color: var(--accent); }
  .lessons li a .tid { color: var(--ink-dim); font-variant-numeric: tabular-nums; font-size: 12px; min-width: 34px; }
  .gapdot {
    margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: var(--warn);
    box-shadow: 0 0 0 2px rgba(255,180,84,.18);
  }

  /* ---- Main content: TEXTBOOK reading mode (mirrors the app's #content) ---- */
  #main { flex: 1; height: 100vh; overflow-y: auto; }
  #content {
    max-width: 720px; margin: 0 auto; padding: 60px 32px 160px; font-size: 17px; line-height: 1.7;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, Cambria, "Times New Roman", serif;
  }
  #content p, #content li { color: var(--ink); }
  .crumbs {
    color: var(--ink-dim); font-size: 12px; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .lesson-title { font-size: 34px; font-weight: 700; line-height: 1.18; letter-spacing: -.012em; margin: 0 0 10px; }
  .lesson-sub { font-size: 18px; font-style: italic; color: var(--ink-dim); margin: 0 0 34px; }

  /* Controls stay in the page sans, not the body serif. */
  .toolbar {
    display: flex; gap: 10px; align-items: center; margin: 0 0 42px; flex-wrap: wrap;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .colab-btn {
    display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 8px;
    font-size: 13.5px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--ink);
  }
  .colab-btn.on:hover { border-color: var(--accent); color: var(--accent); }
  .colab-btn.off { opacity: .5; cursor: not-allowed; }
  .gap-flag {
    font-size: 12px; color: var(--ink-dim); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px;
  }

  /* Each section is plain prose under a bold heading — no cards, boxes, or coloured rules. */
  .card { background: none; border: none; border-radius: 0; box-shadow: none; padding: 0; margin: 0 0 40px; }
  .card h3 { color: var(--ink); font-weight: 700; font-size: 22px; line-height: 1.3; margin: 0 0 14px; }
  .card p:first-of-type { margin-top: 0; }
  .card.mathematics ol.work {
    margin: 12px 0 16px; padding-left: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px;
  }
  .card.mathematics ol.work li { margin: 5px 0; font-variant-numeric: tabular-nums; line-height: 1.5; }
  .scaffold-note { color: var(--ink-dim); font-style: italic; }
  .sec-hint { color: var(--ink-dim); font-size: 15px; margin: 0 0 4px; }

  /* Key equations: centred with breathing room, no box. */
  .formula-box { background: none; border: none; border-radius: 0; padding: 4px 0; margin: 14px 0; overflow-x: auto; text-align: center; }

  /* Worked-example tables: clean ruled textbook table, sans for tabular figures. */
  table.mini {
    border-collapse: collapse; margin: 16px 0; font-size: 15px; line-height: 1.45;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  table.mini th, table.mini td { padding: 6px 18px 6px 0; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.mini tr:first-child th { font-weight: 700; color: var(--ink); border-bottom: 2px solid var(--ink); }
  table.mini tr:last-child td { border-bottom: none; }

  .nav-row { display: flex; gap: 12px; margin-top: 26px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .nav-row button {
    flex: 1; text-align: left; background: none; border: 1px solid var(--border);
    color: var(--ink); border-radius: 10px; padding: 10px 14px; cursor: pointer;
  }
  .nav-row button:disabled { opacity: .4; cursor: default; }
  .nav-row button.next { text-align: right; }
  .nav-row button span { display: block; color: var(--ink-dim); font-size: 12px; }

  #menuToggle {
    display: none; position: fixed; top: 10px; left: 10px; z-index: 20;
    background: var(--panel); color: var(--ink); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; cursor: pointer;
  }
  @media (max-width: 820px) {
    #menuToggle { display: block; }
    #sidebar { position: fixed; z-index: 15; transform: translateX(0); transition: transform .2s; }
    body.nav-collapsed #sidebar { transform: translateX(-105%); }
    #content { padding-top: 56px; }
  }
</style>
</head>
<body>

<button id="menuToggle" onclick="document.body.classList.toggle('nav-collapsed')">☰ Menu</button>

<nav id="sidebar">
  <div class="side-top">
    <button id="themeToggle" title="Toggle theme" onclick="AllML.toggleTheme()">◐</button>
    <input id="search" placeholder="Search all topics…" oninput="AllML.filter(this.value)" />
  </div>
  <div class="umbrella">
    <h1 id="umbrellaTitle">All ML</h1>
    <div class="sub" id="umbrellaSub"></div>
  </div>
  <div id="parts"></div>
</nav>

<main id="main"><div id="content"></div></main>

<!-- Curriculum data (generated) + authored content -->
<script src="lessons/all-ml.js"></script>
<script src="lessons/all-ml-content.js"></script>

<script>
const AllML = (function () {
  const SECTIONS = [
    { key: "context",     label: "Context",
      hint: "How prior topics feed in, and how this topic feeds forward to later lessons." },
    { key: "intuition",   label: "Intuition",
      hint: "The problem, the pain in the older approach, the mental model, and the key design decision." },
    { key: "mathematics", label: "Mathematics",
      hint: "The formula with every symbol and shape named, plus worked numeric examples." },
    { key: "pitfalls",    label: "Pitfalls",
      hint: "Real bugs and their mechanisms, not just symptoms." }
  ];
  const TOPICS = window.ALLML || [];
  const PARTS = window.ALLML_PARTS || [];
  const CONTENT = window.ALLML_CONTENT || {};
  const byId = {};
  const order = [];              // flat id order for prev/next
  const partName = {};
  PARTS.forEach(p => partName[p.num] = p.name);
  TOPICS.forEach(t => { byId[t.id] = t; });

  function topicsOf(partNum) { return TOPICS.filter(t => t.part === partNum); }

  function renderSidebar() {
    const wrap = document.getElementById("parts");
    wrap.innerHTML = "";
    order.length = 0;
    document.getElementById("umbrellaSub").textContent =
      TOPICS.length + " topics · " + PARTS.length + " parts";
    PARTS.forEach(p => {
      const items = topicsOf(p.num);
      const el = document.createElement("div");
      el.className = "part collapsed";
      el.dataset.part = p.num;
      el.innerHTML =
        '<div class="part-head"><span class="chev">▼</span>' +
        '<span>Part ' + p.num + ' — ' + p.name + '</span>' +
        '<span class="pcount">' + items.length + '</span></div>' +
        '<ul class="lessons"></ul>';
      const ul = el.querySelector(".lessons");
      items.forEach(t => {
        order.push(t.id);
        const li = document.createElement("li");
        li.dataset.id = t.id;
        li.dataset.search = (t.id + " " + t.title + " " + p.name).toLowerCase();
        const gap = t.gap ? '<span class="gapdot" title="Not yet in the main app — priority to author"></span>' : "";
        li.innerHTML = '<a class="navlink" href="#' + t.id + '">' +
          '<span class="tid">' + t.id + '</span><span class="ttl">' + t.title + '</span>' + gap + '</a>';
        ul.appendChild(li);
      });
      el.querySelector(".part-head").onclick = () => el.classList.toggle("collapsed");
      wrap.appendChild(el);
    });
  }

  function sectionCard(t, s) {
    const authored = (CONTENT[t.id] && CONTENT[t.id][s.key]) || "";
    const body = authored
      ? authored
      : '<p class="sec-hint">' + s.hint + '</p><p class="scaffold-note">Content to be authored.</p>';
    return '<div class="card ' + s.key + '"><h3>' + s.label + '</h3>' + body + '</div>';
  }

  function colabButton(t) {
    const url = (CONTENT[t.id] && CONTENT[t.id].colab) || t.colab || "";
    if (url) return '<a class="colab-btn on" href="' + url + '" target="_blank" rel="noopener">▶ Open in Colab</a>';
    return '<span class="colab-btn off" title="Notebook not built yet">▶ Open in Colab (pending)</span>';
  }

  function open(id) {
    const t = byId[id];
    const content = document.getElementById("content");
    if (!t) {
      content.innerHTML = '<div class="crumbs">All ML</div><h2 class="lesson-title">Pick a topic</h2>' +
        '<p class="lesson-sub">Choose any of the ' + TOPICS.length + ' topics from the left to open its lesson.</p>';
      return;
    }
    const idx = order.indexOf(id);
    const prev = order[idx - 1], next = order[idx + 1];
    const c = CONTENT[t.id] || {};

    let html =
      '<div class="crumbs">All ML › Part ' + t.part + ' — ' + partName[t.part] + '</div>' +
      '<h2 class="lesson-title">' + t.title + '</h2>' +
      (c.tagline ? '<p class="lesson-sub">' + c.tagline + '</p>' : '') +
      '<div class="toolbar">' +
        colabButton(t) +
        (t.gap ? '<span class="gap-flag" title="Not yet covered in the main ml-math-tutor app">app gap</span>' : '') +
      '</div>' +
      SECTIONS.map(s => sectionCard(t, s)).join("") +
      '<div class="nav-row">' +
        '<button ' + (prev ? 'onclick="AllML.go(\'' + prev + '\')"' : 'disabled') + '>' +
          '<span>← Previous</span>' + (prev ? byId[prev].title : '') + '</button>' +
        '<button class="next" ' + (next ? 'onclick="AllML.go(\'' + next + '\')"' : 'disabled') + '>' +
          '<span>Next →</span>' + (next ? byId[next].title : '') + '</button>' +
      '</div>';

    content.innerHTML = html;
    document.querySelectorAll('.lessons li a').forEach(a =>
      a.classList.toggle('active', a.getAttribute('href') === '#' + id));
    // expand the part containing this topic
    const partEl = document.querySelector('.part[data-part="' + t.part + '"]');
    if (partEl) partEl.classList.remove('collapsed');
    document.getElementById("main").scrollTop = 0;
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([content]);
  }

  function go(id) { location.hash = id; }
  function highlight(id) {
    document.querySelectorAll('.lessons li a').forEach(a =>
      a.classList.toggle('active', a.getAttribute('href') === '#' + id));
  }
  function filter(q) {
    q = (q || "").trim().toLowerCase();
    document.querySelectorAll('.part').forEach(part => {
      let anyVisible = false;
      part.querySelectorAll('.lessons li').forEach(li => {
        const hit = !q || li.dataset.search.indexOf(q) !== -1;
        li.style.display = hit ? "" : "none";
        if (hit) anyVisible = true;
      });
      part.style.display = anyVisible ? "" : "none";
      if (q && anyVisible) part.classList.remove("collapsed");
      if (!q) part.classList.add("collapsed");
    });
  }
  function toggleTheme() {
    const root = document.documentElement;
    const light = root.getAttribute("data-theme") === "light";
    root.setAttribute("data-theme", light ? "dark" : "light");
    try { localStorage.setItem("allml_theme", light ? "dark" : "light"); } catch (e) {}
  }

  function route() {
    const id = location.hash.slice(1);
    open(id || (order[0] || ""));
  }
  function init() {
    try {
      const th = localStorage.getItem("allml_theme");
      if (th) document.documentElement.setAttribute("data-theme", th);
    } catch (e) {}
    renderSidebar();
    window.addEventListener("hashchange", route);
    route();
  }

  return { init, open, go, filter, toggleTheme };
})();
window.AllML = AllML;
document.addEventListener("DOMContentLoaded", AllML.init);
</script>
</body>
</html>
